<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Space Runner</title>
    <link rel="stylesheet" href="1prompt.css">
</head>
<body>
    <canvas id="gameCanvas" width="600" height="800"></canvas>

    <div id="scoreDisplay"></div>

    <div id="startScreen">
        <div id="highscore">Highscore: <span id="highscoreValue">0</span></div>
        <button id="startButton">Start</button>
        <div id="instructions">
            Controls: A/D to move, Space to jump, S to roll.
        </div>
        <button id="backToHub" class="menuBtn">Back to Hub</button>
    </div>

    <div id="gameOverScreen" style="display: none;">
        <div id="newHighscore">New Highscore!</div>
        <div id="finalScore"></div>
        <div id="finalHighscore"></div>
        <button id="playAgainButton">Play Again</button>
        <button id="backToHubGameOver" class="menuBtn">Back to Hub</button>
    </div>

    <script src="1prompt.js"></script>
    <script>
        const backToHub = document.getElementById('backToHub');
        const backToHubGameOver = document.getElementById('backToHubGameOver');

        backToHub.addEventListener('click', () => {
            window.location.href = 'index.html';
        });

        backToHubGameOver.addEventListener('click', () => {
            window.location.href = 'index.html';
        });
    </script>
</body>
</html>
