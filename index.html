<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arcade Arena</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="menu">
        <div class="menu-card">
            <h1>Arcade Arena</h1>
            <p class="subtitle">Select a game to begin</p>

            <div id="gameButtons">
                <button id="tagZoneBtn" class="menuBtn">Tag Zone</button>
                <button id="platformerBtn" class="menuBtn">Space Runner</button>
                <button id="playBtn" class="menuBtn">Fast Eagle</button>
            </div>

            <button id="achievementsBtn" class="menuBtn menuBtn-achievements">Achievements</button>
        </div>
    </div>

    <div id="achievementsBackdrop" class="modal-backdrop hidden"></div>
    <aside id="achievementsModal" class="achievements-modal hidden" aria-hidden="true">
        <button id="closeAchievementsBtn" class="modal-close" aria-label="Close achievements">×</button>
        <h3 class="achievements-title">Achievements</h3>
        <div id="achievementsList" class="achievements-list"></div>
    </aside>

    <div id="gameContainer" class="hidden">
        <div class="game-card">
            <h2 id="gameTitle">Game</h2>

            <div class="canvas-wrapper">
                <canvas id="gameCanvas" width="480" height="720" class="hidden"></canvas>

                <div id="spaceRunnerUi" class="space-runner-ui hidden">
                    <div id="scoreDisplay" class="space-runner-score hidden"></div>

                    <div id="startScreen" class="space-runner-overlay">
                        <div id="highscore">Highscore: <span id="highscoreValue">0</span></div>
                        <button id="startButton" class="menuBtn">Start</button>
                        <div id="instructions">
                            Controls: A/D to move, Space to jump, S to roll.
                        </div>
                    </div>

                    <div id="gameOverScreen" class="space-runner-overlay hidden">
                        <div id="newHighscore">New Highscore!</div>
                        <div id="finalScore"></div>
                        <div id="finalHighscore"></div>
                        <button id="playAgainButton" class="menuBtn">Play Again</button>
                    </div>
                </div>

                <div id="tagHud" class="tag-hud hidden">
                    <div class="hud-box">
                        <span>Time</span>
                        <strong id="tagTimer">0</strong>
                    </div>

                    <div class="hud-box">
                        <span>Level</span>
                        <strong id="tagLevel">1</strong>
                    </div>

                    <div id="inventoryHud">
                        <div class="inventory-slot"></div>
                        <div class="inventory-slot"></div>
                        <div class="inventory-slot"></div>
                    </div>
                </div>

                <button id="restartBtn" class="menuBtn hidden canvas-restart-btn">Restart</button>
            </div>

            <p id="gameMessage">This game is coming soon.</p>

            <div class="game-controls">
                <button id="backBtn" class="menuBtn">Back to Hub</button>
            </div>
        </div>
    </div>

    <script src="1prompt.js"></script>
    <script src="script.js"></script>
</body>
</html>
