<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neon Kill — Arcade Arena</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #000;
            font-family: 'Courier New', Courier, monospace;
            color: #eef8ff;
        }
        #gameRoot { position: relative; width: 100%; height: 100%; }
        canvas { display: block; width: 100%; height: 100%; }
        #ui {
            position: absolute;
            inset: 0;
            pointer-events: none;
            padding: 24px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }
        .ui-top {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }
        .ui-bottom {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
        }
        .panel {
            background: rgba(0, 0, 0, 0.55);
            border: 1px solid rgba(255, 0, 127, 0.45);
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.15);
            padding: 14px 18px;
            min-width: 160px;
        }
        .label {
            font-size: 10px;
            letter-spacing: 0.2em;
            color: #00ffff;
            text-transform: uppercase;
            margin-bottom: 6px;
        }
        .health-val {
            font-size: 2.4rem;
            font-weight: bold;
            color: #ff007f;
            text-shadow: 0 0 12px rgba(255, 0, 127, 0.6);
        }
        .score-val, .wave-val {
            font-size: 1.8rem;
            font-weight: bold;
            color: #fff;
        }
        .style-rank {
            font-size: 1.5rem;
            font-weight: bold;
            color: #00ffff;
            text-shadow: 0 0 14px rgba(0, 255, 255, 0.5);
        }
        .style-mult {
            font-size: 0.95rem;
            color: #ff007f;
            margin-top: 4px;
        }
        #crosshair {
            position: fixed;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            width: 0;
            height: 0;
            pointer-events: none;
            z-index: 6;
        }
        #crosshair .dot {
            position: absolute;
            width: 4px;
            height: 4px;
            left: -2px;
            top: -2px;
            background: #00ffcc;
            border-radius: 50%;
            box-shadow: 0 0 8px #00ffcc, 0 0 14px rgba(0, 255, 204, 0.45);
        }
        #crosshair .tick {
            position: absolute;
            background: rgba(0, 255, 204, 0.9);
            box-shadow: 0 0 5px rgba(0, 255, 204, 0.7);
        }
        #crosshair .tick.top { width: 2px; height: 9px; left: -1px; top: -16px; }
        #crosshair .tick.bottom { width: 2px; height: 9px; left: -1px; top: 7px; }
        #crosshair .tick.left { width: 9px; height: 2px; left: -16px; top: -1px; }
        #crosshair .tick.right { width: 9px; height: 2px; left: 7px; top: -1px; }
        #parryFlash {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 7;
            opacity: 0;
            background: radial-gradient(circle at center, rgba(255, 255, 255, 0.95) 0%, rgba(0, 255, 255, 0.55) 45%, rgba(255, 255, 255, 0.15) 100%);
            transition: opacity 0.05s linear;
        }
        #parryFlash.solid { background: #ffffff; }
        #damageFlash {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 6;
            opacity: 0;
            transition: opacity 0.04s linear;
        }
        #defeatFlash {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 11;
            opacity: 0;
            background: #ffffff;
        }
        #startScreen, #gameOverScreen {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 16px;
            background: rgba(0, 0, 0, 0.82);
            pointer-events: auto;
            text-align: center;
            padding: 24px;
        }
        #gameOverScreen { display: none; }
        h1 {
            font-size: clamp(2rem, 6vw, 3.5rem);
            letter-spacing: 0.25em;
            color: #ff007f;
            text-shadow: 0 0 24px rgba(255, 0, 127, 0.5);
        }
        .hint { max-width: 520px; line-height: 1.6; color: #b8c4d8; font-size: 14px; }
        .btn {
            pointer-events: auto;
            cursor: pointer;
            padding: 12px 28px;
            border: 2px solid #00ffff;
            background: rgba(0, 255, 255, 0.1);
            color: #00ffff;
            font-family: inherit;
            font-size: 13px;
            letter-spacing: 0.15em;
            text-transform: uppercase;
        }
        .btn:hover { background: rgba(0, 255, 255, 0.25); }
        #backHub {
            position: absolute;
            top: 16px;
            left: 16px;
            pointer-events: auto;
            z-index: 10;
        }
        .hidden { display: none !important; }
        #bossHud {
            position: fixed;
            top: 24px;
            left: 50%;
            transform: translateX(-50%) translateY(-140%);
            width: min(560px, 78vw);
            display: none;
            pointer-events: none;
            z-index: 8;
            text-align: center;
            opacity: 0;
            transition: transform 0.45s cubic-bezier(0.22, 1, 0.36, 1), opacity 0.35s ease;
        }
        #bossHud.visible {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
        }
        #bossHud.glitch-in {
            animation: bossHudGlitch 0.55s ease forwards;
        }
        @keyframes bossHudGlitch {
            0% { transform: translateX(-50%) translateY(-140%); opacity: 0; filter: hue-rotate(0deg); }
            35% { transform: translateX(calc(-50% + 6px)) translateY(10px); opacity: 0.85; filter: hue-rotate(40deg); }
            55% { transform: translateX(calc(-50% - 4px)) translateY(2px); opacity: 1; }
            75% { transform: translateX(calc(-50% + 2px)) translateY(0); }
            100% { transform: translateX(-50%) translateY(0); opacity: 1; filter: hue-rotate(0deg); }
        }
        #bossName {
            font-size: 11px;
            letter-spacing: 0.32em;
            color: #ff2244;
            text-shadow: 0 0 12px rgba(255, 34, 68, 0.65), 0 0 24px rgba(255, 0, 60, 0.25);
            margin-bottom: 8px;
            text-transform: uppercase;
            font-weight: bold;
        }
        #bossBarTrack {
            width: 100%;
            height: 12px;
            background: rgba(0, 0, 0, 0.88);
            border: 1px solid rgba(255, 34, 68, 0.55);
            box-shadow: 0 0 22px rgba(255, 0, 60, 0.25), inset 0 0 12px rgba(0, 0, 0, 0.6);
        }
        #bossBarFill {
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, #ff0033, #ff2255, #ff4477);
            box-shadow: 0 0 16px rgba(255, 0, 51, 0.85);
            transform-origin: left center;
            transform: scaleX(1);
            transition: transform 0.12s linear;
        }
        #bossDialogue {
            position: fixed;
            left: 50%;
            bottom: 118px;
            transform: translateX(-50%);
            width: min(720px, 90vw);
            padding: 18px 22px;
            background: rgba(0, 0, 0, 0.78);
            border: 1px solid rgba(0, 255, 255, 0.45);
            box-shadow: 0 0 28px rgba(255, 0, 127, 0.18), inset 0 0 24px rgba(0, 255, 255, 0.06);
            display: none;
            pointer-events: none;
            z-index: 9;
            text-align: center;
        }
        #bossDialogue.visible { display: block; }
        #bossDialogueText {
            font-size: 13px;
            letter-spacing: 0.14em;
            line-height: 1.65;
            color: #d8f4ff;
            text-transform: uppercase;
            min-height: 1.6em;
        }
        #bossDialogueText::after {
            content: '▌';
            color: #00ffff;
            animation: dialogueBlink 0.8s step-end infinite;
        }
        #bossDialogue.done #bossDialogueText::after { content: ''; animation: none; }
        @keyframes dialogueBlink {
            50% { opacity: 0; }
        }
    </style>
</head>
<body>
    <div id="gameRoot">
        <button id="backHub" class="btn">← Hub</button>
        <div id="parryFlash"></div>
        <div id="damageFlash" aria-hidden="true"></div>
        <div id="defeatFlash" aria-hidden="true"></div>
        <div id="crosshair" aria-hidden="true">
            <span class="dot"></span>
            <span class="tick top"></span>
            <span class="tick bottom"></span>
            <span class="tick left"></span>
            <span class="tick right"></span>
        </div>
        <div id="bossHud">
            <div id="bossName">WAVE 05 // APEX SENTRY</div>
            <div id="bossBarTrack"><div id="bossBarFill"></div></div>
        </div>
        <div id="bossDialogue">
            <div id="bossDialogueText"></div>
        </div>
        <div id="ui">
            <div class="ui-top">
                <div class="panel">
                    <div class="label">Wave</div>
                    <div class="wave-val" id="waveDisplay">1</div>
                </div>
                <div class="panel">
                    <div class="label">Score</div>
                    <div class="score-val" id="scoreDisplay">0</div>
                </div>
            </div>
            <div class="ui-bottom">
                <div class="panel">
                    <div class="label">Health</div>
                    <div class="health-val" id="healthDisplay">100</div>
                </div>
                <div class="panel" style="text-align: right;">
                    <div class="label">Style</div>
                    <div class="style-rank" id="rankDisplay">DULL</div>
                    <div class="style-mult" id="multDisplay">×1.0</div>
                </div>
            </div>
        </div>
        <div id="startScreen">
            <h1>NEON KILL</h1>
            <p class="hint">Click to lock pointer. WASD move · Space jump/slam · Shift slide · Tap LMB shoot · Hold LMB charge pierce · RMB/E parry.<br>Parry reflects shots for 3× damage. Kill enemies to absorb heal particles.</p>
            <button class="btn" id="startBtn">Enter Arena</button>
        </div>
        <div id="gameOverScreen">
            <h1>TERMINATED</h1>
            <p class="hint" id="finalStats"></p>
            <button class="btn" id="retryBtn">Retry</button>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
    (() => {
        let score = 0;
        let styleMultiplier = 1.0;
        let styleRank = 'DULL';
        let wave = 1;
        let player = {
            hp: 100,
            maxHp: 100,
            isSliding: false,
            isParrying: false,
            canDash: true,
            canBeLaunched: true,
            vel: { y: 0 },
            onPad: false
        };

        let hasOverclockCore = false;
        let hasSiphonNanites = false;
        let hasSlamModule = false;

        window.NeonKillSetup = {
            enableOverclockCore: () => { hasOverclockCore = true; },
            enableSiphonNanites: () => { hasSiphonNanites = true; },
            enableSlamModule: () => { hasSlamModule = true; }
        };

        try {
            const saved = JSON.parse(sessionStorage.getItem('neonKillUpgrades') || '{}');
            if (saved.overclock) window.NeonKillSetup.enableOverclockCore();
            if (saved.siphon) window.NeonKillSetup.enableSiphonNanites();
            if (saved.slam) window.NeonKillSetup.enableSlamModule();
        } catch (_) {}

        const ARENA = 40;
        const FLOOR_Y = 0;
        const EYE_HEIGHT = 1.65;
        const SLIDE_HEIGHT = EYE_HEIGHT * 0.5;
        const BASE_SPEED = 14;
        const GRAVITY = 38;
        const JUMP_V = 13;

        let gameRunning = false;
        let pointerLocked = false;
        let yaw = 0;
        let pitch = 0;
        let velY = 0;
        let onGround = true;
        let isSlamming = false;
        let parryTimer = 0;
        let parryAnimTimer = 0;
        let shootCooldown = 0;
        let gunRecoil = 0;
        let freezeTimer = 0;
        let flashTimer = 0;
        let hitFlashTimer = 0;
        let hitFlashAngle = 0;
        let screenShake = 0;
        let isCharging = false;
        let chargeLevel = 0;
        let parryBursts = [];
        let beamEffects = [];
        let laserWalls = [];
        let shockwaves = [];
        let voidSlamZones = [];
        let voidEventHorizon = null;
        let voidMeleeSlashes = [];
        let voidDecoys = [];
        let voidTransformActive = false;
        let voidTransformPhase = 'idle';
        let voidTransformTimer = 0;
        let cinematicDialogueActive = false;
        let cinematicDialogueLine = '';
        let cinematicDialogueChars = 0;
        let cinematicDialogueDone = false;
        let cinematicDialogueLastCount = 0;
        let cinematicDialogueOnComplete = null;
        let cinematicDialogueUseGlitch = false;
        let bossDebris = [];
        let bossDefeatActive = false;
        let bossDefeatPhase = 'idle';
        let bossDefeatTimer = 0;
        let enemies = [];
        let projectiles = [];
        let healParticles = [];
        let keys = {};
        let mouseDown = { left: false, right: false };
        let isBossWave = false;
        let activeBoss = null;
        let bossIntroActive = false;
        let typewriterChars = 0;
        let typewriterDone = false;
        let introHoldTimer = 5;
        let introDialogueLine = '';
        let lastDialogueCharCount = 0;
        let chargeWasFull = false;

        const PLAYER_SHOT_DAMAGE = 25;
        const PARRY_SHOT_DAMAGE = PLAYER_SHOT_DAMAGE * 3;
        const PIERCE_DAMAGE = 55;
        const BOSS_PRIMARY_DMG = 5;
        const BOSS_PARRY_DMG = 95;
        const BOSS_PIERCE_DMG = 140;
        const BOSS_VOID_PIERCE_CRIT = 220;
        const BOSS_VOID_PARRY_CRIT = 340;
        const BOSS_VOID_BLINK_PARRY_CRIT = 280;
        const CHASM_Y = -10;
        const JUMP_PAD_VEL = 35;
        const FLOOR_LIMIT = ARENA - 0.85;

        const scene = new THREE.Scene();

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 200);

        const viewFlags = { depthTest: false, depthWrite: false, fog: false };
        const metalDark = new THREE.MeshBasicMaterial({ color: 0x2a2f35, ...viewFlags });
        const metalMid = new THREE.MeshBasicMaterial({ color: 0x3d454d, ...viewFlags });
        const metalLight = new THREE.MeshBasicMaterial({ color: 0x4a525a, ...viewFlags });
        const metalEdge = new THREE.LineBasicMaterial({ color: 0x667788, transparent: true, opacity: 0.8, ...viewFlags });
        const cyanSlotMat = new THREE.MeshBasicMaterial({ color: 0x00ffff, ...viewFlags });
        const armFillMat = new THREE.MeshBasicMaterial({ color: 0xff007f, transparent: true, opacity: 0.02, ...viewFlags });
        const armWireMat = new THREE.LineBasicMaterial({ color: 0xff007f, transparent: true, opacity: 0.95, ...viewFlags });

        const REVOLVER_BASE = { x: 0.35, y: -0.35, z: -0.7 };
        const parryRestPos = new THREE.Vector3(-0.5, -0.4, -0.6);
        const parryWindPos = new THREE.Vector3(-0.52, -0.41, -0.52);
        const parryStrikePos = new THREE.Vector3(0.1, -0.32, -0.36);
        const parryWindRot = { x: 0, y: -0.28, z: 0 };
        const parryStrikeRot = { x: -0.15, y: 0.18, z: Math.PI / 4 };

        function addSolidWithEdges(geo, fillMat, edgeMat) {
            const mesh = new THREE.Mesh(geo, fillMat);
            const wire = new THREE.LineSegments(new THREE.EdgesGeometry(geo), edgeMat);
            const g = new THREE.Group();
            g.add(mesh, wire);
            return g;
        }

        function addWireHologram(geo) {
            const mesh = new THREE.Mesh(geo, armFillMat);
            const wire = new THREE.LineSegments(new THREE.EdgesGeometry(geo), armWireMat);
            const g = new THREE.Group();
            g.add(mesh, wire);
            return g;
        }

        const batteryCanvas = document.createElement('canvas');
        batteryCanvas.width = 64;
        batteryCanvas.height = 32;
        const batteryCtx = batteryCanvas.getContext('2d');
        const batteryTexture = new THREE.CanvasTexture(batteryCanvas);
        const batteryMat = new THREE.MeshBasicMaterial({ map: batteryTexture, ...viewFlags });

        function drawBatteryHUD() {
            const ctx = batteryCtx;
            const w = batteryCanvas.width;
            const h = batteryCanvas.height;
            ctx.clearRect(0, 0, w, h);
            ctx.fillStyle = '#0a1018';
            ctx.fillRect(0, 0, w, h);

            let color = '#00ffff';
            if (isCharging && chargeLevel > 0) {
                if (chargeLevel >= 100) color = '#ff2200';
                else color = Math.sin(performance.now() * 0.025) > 0 ? '#ff8800' : '#ff4400';
            }

            ctx.strokeStyle = color;
            ctx.lineWidth = 2;
            ctx.strokeRect(4, 7, 46, 18);
            ctx.fillStyle = color;
            ctx.fillRect(50, 12, 5, 8);

            const segments = 4;
            const filled = Math.ceil((chargeLevel / 100) * segments);
            for (let i = 0; i < segments; i++) {
                ctx.fillStyle = i < filled ? color : '#1a2530';
                ctx.fillRect(8 + i * 10, 10, 7, 12);
            }
            batteryTexture.needsUpdate = true;
        }

        const cyberRevolver = new THREE.Group();

        const topStrap = addSolidWithEdges(new THREE.BoxGeometry(0.28, 0.06, 0.12), metalMid, metalEdge);
        topStrap.position.set(0.02, 0.1, 0.02);
        const receiver = addSolidWithEdges(new THREE.BoxGeometry(0.26, 0.14, 0.18), metalDark, metalEdge);
        receiver.position.set(0, 0.02, 0);
        const grip = addSolidWithEdges(new THREE.BoxGeometry(0.11, 0.26, 0.14), metalDark, metalEdge);
        grip.position.set(-0.03, -0.16, 0.03);
        grip.rotation.z = 0.12;
        const triggerGuard = addSolidWithEdges(new THREE.BoxGeometry(0.08, 0.08, 0.1), metalLight, metalEdge);
        triggerGuard.position.set(0.02, -0.06, 0.04);

        const chamberGeo = new THREE.CylinderGeometry(0.09, 0.09, 0.1, 8);
        const chamber = new THREE.Mesh(chamberGeo, metalDark);
        chamber.rotation.x = Math.PI / 2;
        chamber.position.set(0.04, 0.04, -0.02);
        const chamberWire = new THREE.LineSegments(new THREE.EdgesGeometry(chamberGeo), metalEdge);
        chamberWire.rotation.copy(chamber.rotation);
        chamberWire.position.copy(chamber.position);
        for (let i = 0; i < 6; i++) {
            const slot = new THREE.Mesh(new THREE.BoxGeometry(0.018, 0.04, 0.022), cyanSlotMat);
            const angle = (Math.PI * 2 / 6) * i;
            slot.position.set(
                0.04 + Math.cos(angle) * 0.092,
                0.04,
                -0.02 + Math.sin(angle) * 0.092
            );
            cyberRevolver.add(slot);
        }

        const barrelLen = 0.42;
        const heavyBarrel = addSolidWithEdges(new THREE.BoxGeometry(0.1, 0.1, barrelLen), metalMid, metalEdge);
        heavyBarrel.position.set(0.04, 0.04, -0.08 - barrelLen * 0.5);
        const barrelShroud = addSolidWithEdges(new THREE.BoxGeometry(0.14, 0.06, barrelLen * 0.55), metalDark, metalEdge);
        barrelShroud.position.set(0.04, 0.1, -0.1 - barrelLen * 0.28);

        const muzzlePoint = new THREE.Object3D();
        muzzlePoint.position.set(0.04, 0.04, -0.08 - barrelLen);

        const batteryHUD = new THREE.Mesh(new THREE.PlaneGeometry(0.09, 0.045), batteryMat);
        batteryHUD.position.set(-0.05, 0.08, 0.1);
        batteryHUD.rotation.set(-0.55, 0.15, 0);

        cyberRevolver.add(topStrap, receiver, grip, triggerGuard, chamber, chamberWire, heavyBarrel, barrelShroud, muzzlePoint, batteryHUD);
        cyberRevolver.position.set(REVOLVER_BASE.x, REVOLVER_BASE.y, REVOLVER_BASE.z);
        cyberRevolver.rotation.set(-0.1, 0.04, 0.02);
        cyberRevolver.renderOrder = 999;
        camera.add(cyberRevolver);
        drawBatteryHUD();

        const armGroup = new THREE.Group();

        const forearmGeo = new THREE.BoxGeometry(0.38, 0.11, 0.12);
        const forearm = addWireHologram(forearmGeo);
        forearm.position.set(-0.06, 0, 0);

        const fistGeo = new THREE.BoxGeometry(0.2, 0.18, 0.16);
        const fist = addWireHologram(fistGeo);
        fist.position.set(0.22, 0.01, 0.02);

        armGroup.add(forearm, fist);
        armGroup.visible = false;
        armGroup.position.copy(parryRestPos);
        armGroup.renderOrder = 1000;
        camera.add(armGroup);

        scene.add(camera);

        const parryFlashEl = document.getElementById('parryFlash');
        const damageFlashEl = document.getElementById('damageFlash');
        const defeatFlashEl = document.getElementById('defeatFlash');
        const bossHudEl = document.getElementById('bossHud');
        const bossNameEl = document.getElementById('bossName');
        const bossBarFillEl = document.getElementById('bossBarFill');
        const bossDialogueEl = document.getElementById('bossDialogue');
        const bossDialogueTextEl = document.getElementById('bossDialogueText');
        const PARRY_WINDOW = 0.2;
        const PARRY_ANIM_MS = 150;
        const PARRY_FLASH_DECAY = 0.15;
        const TAP_HOLD_THRESHOLD = 0.16;
        const CHARGE_RATE = 112;

        let audioCtx = null;
        let leftHoldTime = 0;
        let chargeCommitted = false;
        function initAudio() {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if (audioCtx.state === 'suspended') audioCtx.resume();
            return audioCtx;
        }

        function playShootSound() {
            const ctx = initAudio();
            const t = ctx.currentTime;
            const osc = ctx.createOscillator();
            const gain = ctx.createGain();
            osc.type = 'sawtooth';
            osc.frequency.setValueAtTime(800, t);
            osc.frequency.exponentialRampToValueAtTime(100, t + 0.1);
            gain.gain.setValueAtTime(0.18, t);
            gain.gain.exponentialRampToValueAtTime(0.001, t + 0.1);
            osc.connect(gain);
            gain.connect(ctx.destination);
            osc.start(t);
            osc.stop(t + 0.11);
        }

        function playParryImpactSound() {
            const ctx = initAudio();
            const t = ctx.currentTime;
            const osc = ctx.createOscillator();
            osc.type = 'sine';
            osc.frequency.setValueAtTime(1400, t);
            osc.frequency.exponentialRampToValueAtTime(900, t + 0.08);
            const gain = ctx.createGain();
            gain.gain.setValueAtTime(0.55, t);
            gain.gain.exponentialRampToValueAtTime(0.001, t + 0.22);
            osc.connect(gain);
            gain.connect(ctx.destination);
            osc.start(t);
            osc.stop(t + 0.24);
        }

        function playChargeReadyClick() {
            const ctx = initAudio();
            const t = ctx.currentTime;
            const master = ctx.createGain();
            master.gain.setValueAtTime(0.42, t);
            master.connect(ctx.destination);

            const click = ctx.createOscillator();
            click.type = 'square';
            click.frequency.setValueAtTime(2400, t);
            click.frequency.exponentialRampToValueAtTime(780, t + 0.022);
            const clickGain = ctx.createGain();
            clickGain.gain.setValueAtTime(0.55, t);
            clickGain.gain.exponentialRampToValueAtTime(0.001, t + 0.035);
            click.connect(clickGain);
            clickGain.connect(master);
            click.start(t);
            click.stop(t + 0.04);

            const snapLen = Math.floor(ctx.sampleRate * 0.018);
            const snapBuf = ctx.createBuffer(1, snapLen, ctx.sampleRate);
            const snapData = snapBuf.getChannelData(0);
            for (let i = 0; i < snapLen; i += 1) {
                snapData[i] = (Math.random() * 2 - 1) * (1 - i / snapLen);
            }
            const snap = ctx.createBufferSource();

        function triggerDirectionalHitFlash(sourcePos) {
            const dx = sourcePos.x - playerPos.x;
            const dz = sourcePos.z - playerPos.z;
            hitFlashAngle = Math.atan2(dx, -dz) - yaw;
            hitFlashTimer = 0.42;
            updateDamageFlashVisual(1);
        }

        function updateDamageFlashVisual(intensity) {
            const c = Math.cos(hitFlashAngle);
            const s = Math.sin(hitFlashAngle);
            const top = Math.max(0, c) * intensity;
            const bottom = Math.max(0, -c) * intensity;
            const right = Math.max(0, s) * intensity;
            const left = Math.max(0, -s) * intensity;
            damageFlashEl.style.opacity = String(Math.min(0.82, 0.25 + intensity * 0.55));
            damageFlashEl.style.background = [
                `linear-gradient(to bottom, rgba(255,24,48,${top * 0.78}) 0%, transparent 44%)`,
                `linear-gradient(to top, rgba(255,24,48,${bottom * 0.78}) 0%, transparent 44%)`,
                `linear-gradient(to right, rgba(255,24,48,${right * 0.78}) 0%, transparent 40%)`,
                `linear-gradient(to left, rgba(255,24,48,${left * 0.78}) 0%, transparent 40%)`
            ].join(', ');
        }

        function updateDamageFlash(dt) {
            if (hitFlashTimer <= 0) {
                damageFlashEl.style.opacity = '0';
                return;
            }
            hitFlashTimer = Math.max(0, hitFlashTimer - dt);
            updateDamageFlashVisual(hitFlashTimer / 0.42);
        }

            if (player.hp <= 0) return;
            const prev = player.hp;
            player.hp -= dps * dt;
            if (player.hp < prev) triggerDirectionalHitFlash(sourcePos);
            if (player.hp <= 0) gameOver();
            else updateUI();
        }

        function drawObsidianFloor(t) {
            const ctx = floorCanvasCtx;
            const w = floorCanvas.width;
            const h = floorCanvas.height;
            const pulse = 0.42 + Math.sin(t * 1.65) * 0.28;
            const step = 32;

            ctx.fillStyle = '#04040a';
            ctx.fillRect(0, 0, w, h);

            for (let y = 0; y <= h; y += step) {
                for (let x = 0; x <= w; x += step) {
                    const nx = (x / w - 0.5) * 2;
                    const ny = (y / h - 0.5) * 2;
                    const dist = Math.min(1, Math.hypot(nx, ny));
                    const cellPulse = pulse * (0.12 + (1 - dist) * 0.5);
                    ctx.fillStyle = `rgba(8, 4, 14, ${0.55 + cellPulse * 0.25})`;
                    ctx.fillRect(x + 1, y + 1, step - 2, step - 2);
                    ctx.strokeStyle = `rgba(120, 30, 110, ${cellPulse * 0.55})`;
                    ctx.lineWidth = 1;
                    ctx.strokeRect(x + 0.5, y + 0.5, step, step);
                }
            }

            ctx.strokeStyle = `rgba(255, 0, 90, ${pulse * 0.18})`;
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(w * 0.5, 0);
            ctx.lineTo(w * 0.5, h);
            ctx.moveTo(0, h * 0.5);
            ctx.lineTo(w, h * 0.5);
            ctx.stroke();
            floorTexture.needsUpdate = true;
        }

        function startCinematicDialogue(line, useGlitch, onComplete) {
            cinematicDialogueActive = true;
            cinematicDialogueLine = line;
            cinematicDialogueChars = 0;
            cinematicDialogueDone = false;
            cinematicDialogueLastCount = 0;
            cinematicDialogueOnComplete = onComplete;
            cinematicDialogueUseGlitch = useGlitch;
            showBossDialogue();
            bossDialogueTextEl.textContent = '';
            bossDialogueEl.classList.remove('done');
        }

        function updateCinematicDialogue(rawDt) {
            if (!cinematicDialogueActive || cinematicDialogueDone) return;
            const speed = Math.max(24, cinematicDialogueLine.length / 2);
            cinematicDialogueChars += rawDt * speed;
            const nextCount = Math.floor(cinematicDialogueChars);
            const shown = cinematicDialogueLine.slice(0, nextCount);
            if (nextCount > cinematicDialogueLastCount) {
                if (cinematicDialogueUseGlitch) {
                    emitGlitchBlipsForLine(cinematicDialogueLine, cinematicDialogueLastCount, nextCount);
                } else {
                    const prevLine = introDialogueLine;
                    introDialogueLine = cinematicDialogueLine;
                    emitDialogueTypewriterBlips(cinematicDialogueLastCount, nextCount);
                    introDialogueLine = prevLine;
                }
                cinematicDialogueLastCount = nextCount;
            }
            bossDialogueTextEl.textContent = shown;
            if (shown.length >= cinematicDialogueLine.length) {
                cinematicDialogueDone = true;
                cinematicDialogueActive = false;
                bossDialogueEl.classList.add('done');
                const done = cinematicDialogueOnComplete;
                cinematicDialogueOnComplete = null;
                if (done) done();
            }
        }

        function updateBossDialogue(rawDt) {
            if (!bossIntroActive) return;

            if (!typewriterDone) {
                typewriterChars += rawDt * 38;
                const nextCount = Math.floor(typewriterChars);
                const shown = introDialogueLine.slice(0, nextCount);
                if (nextCount > lastDialogueCharCount) {
                    emitDialogueTypewriterBlips(lastDialogueCharCount, nextCount);
                    lastDialogueCharCount = nextCount;
                }
                bossDialogueTextEl.textContent = shown;
                if (shown.length >= introDialogueLine.length) {
                    typewriterDone = true;
                    bossDialogueEl.classList.add('done');
                    introHoldTimer = 5;
                }
                return;
            }

            introHoldTimer = Math.max(0, introHoldTimer - rawDt);
            if (introHoldTimer <= 0) {
                bossIntroActive = false;
                hideBossDialogue();
            }
        }

        function clearLaserWalls() {
            laserWalls.forEach(w => scene.remove(w.mesh));
            laserWalls = [];
        }

        function clearShockwaves() {
            shockwaves.forEach(s => scene.remove(s.mesh));
            shockwaves = [];
        }

        function clearVoidSlamZones() {
            voidSlamZones.forEach(z => {
                if (z.mesh) scene.remove(z.mesh);
                if (z.glow) scene.remove(z.glow);
            });
            voidSlamZones = [];
        }

        function clearVoidEventHorizon() {
            if (!voidEventHorizon) return;
            if (voidEventHorizon.mesh) scene.remove(voidEventHorizon.mesh);
            if (voidEventHorizon.wire) scene.remove(voidEventHorizon.wire);
            voidEventHorizon = null;
        }

        function clearBossDebris() {
            bossDebris.forEach(d => scene.remove(d.mesh));
            bossDebris = [];
        }

        function clearVoidPhantomExtras() {
            voidMeleeSlashes.forEach(s => scene.remove(s.mesh));
            voidMeleeSlashes = [];
            voidDecoys.forEach(d => scene.remove(d.mesh));
            voidDecoys = [];
        }

        function clearBossExtras() {
            clearLaserWalls();
            clearShockwaves();
            clearVoidSlamZones();
            clearVoidEventHorizon();
            clearVoidPhantomExtras();
        }

        function buildVoidTentacle(segCount, color) {
            const group = new THREE.Group();
            const segments = [];
            let y = 0;
            for (let i = 0; i < segCount; i += 1) {
                const h = 1.1;
                const geo = new THREE.CylinderGeometry(0.2 - i * 0.014, 0.26 - i * 0.014, h, 7);
                const mat = new THREE.LineBasicMaterial({ color, transparent: true, opacity: 0.92 });
                const wire = new THREE.LineSegments(new THREE.EdgesGeometry(geo), mat);
                wire.position.y = y + h * 0.5;
                group.add(wire);
                segments.push({ wire, mat, baseY: y + h * 0.5, phase: i * 0.65 });
                y += h * 0.9;
            }
            return { group, segments };
        }

        function getSlamZonePos(zone) {
            if (zone === 'left') return { x: -ARENA * 0.34, z: 0 };
            if (zone === 'right') return { x: ARENA * 0.34, z: 0 };
            return { x: 0, z: 0 };
        }

        function slamZoneForTentacle(index) {
            if (index === 1 || index === 4) return 'left';
            if (index === 3 || index === 5) return 'right';
            return 'center';
        }

        function spawnSlamIndicator(zone) {
            const pos = getSlamZonePos(zone);
            const geo = new THREE.RingGeometry(3.5, 8.5, 32);
            geo.rotateX(-Math.PI / 2);
            const mesh = new THREE.Mesh(
                geo,
                new THREE.MeshBasicMaterial({
                    color: 0xff0022,
                    transparent: true,
                    opacity: 0.35,
                    side: THREE.DoubleSide
                })
            );
            mesh.position.set(pos.x, FLOOR_Y + 0.08, pos.z);
            scene.add(mesh);
            const glow = new THREE.Mesh(
                new THREE.PlaneGeometry(18, 14),
                new THREE.MeshBasicMaterial({
                    color: 0xff1133,
                    transparent: true,
                    opacity: 0.22,
                    side: THREE.DoubleSide
                })
            );
            glow.rotation.x = -Math.PI / 2;
            glow.position.set(pos.x, FLOOR_Y + 0.06, pos.z);
            scene.add(glow);
            voidSlamZones.push({ mesh, glow, zone, life: 1.2, phase: 'warn' });
        }

        function playerInSlamZone(zone) {
            const pos = getSlamZonePos(zone);
            if (playerPos.y > FLOOR_Y + 3.4) return false;
            return Math.abs(playerPos.x - pos.x) < 9 && Math.abs(playerPos.z - pos.z) < 7;
        }

        function setTentacleCharge(tentacles, indices, charged) {
            indices.forEach(i => {
                const t = tentacles[i];
                if (!t) return;
                t.segments.forEach(seg => {
                    seg.mat.color.setHex(charged ? 0xff1133 : 0xaa55ff);
                    seg.mat.opacity = charged ? 1 : 0.88;
                });
                t.charged = charged;
            });
        }

        function animateTentacleSlam(tentacle, zone, impact) {
            const pos = getSlamZonePos(zone);
            const angle = Math.atan2(pos.x, pos.z);
            tentacle.group.rotation.y = THREE.MathUtils.lerp(tentacle.group.rotation.y, angle, impact ? 0.35 : 0.12);
            const dip = impact ? -4.5 : -1.2;
            tentacle.group.rotation.x = THREE.MathUtils.lerp(tentacle.group.rotation.x, dip, impact ? 0.5 : 0.15);
            tentacle.group.position.y = impact ? -2.2 : 0;
        }

        function updateVoidTentacleIdle(t, dt, time) {
            t.group.rotation.x = Math.sin(time * 1.4 + t.baseAngle) * 0.35;
            t.group.rotation.z = Math.cos(time * 1.1 + t.baseAngle) * 0.22;
            t.segments.forEach((seg, i) => {
                seg.wire.rotation.x = Math.sin(time * 2.2 + seg.phase) * 0.45;
                seg.wire.rotation.z = Math.cos(time * 1.7 + seg.phase) * 0.35;
                seg.wire.position.y = seg.baseY + Math.sin(time * 3 + seg.phase) * 0.18;
            });
        }

        function updateVoidPlates(b, time) {
            const open = b.coreExposed ? 1 : 0;
            (b.plates || []).forEach((plate, i) => {
                const slide = open * 1.4 + Math.sin(time * 0.8 + i) * 0.08;
                plate.mesh.position.copy(plate.base).add(plate.normal.clone().multiplyScalar(slide));
                plate.wire.position.copy(plate.mesh.position);
                plate.mesh.rotation.copy(plate.baseRot);
                plate.wire.rotation.copy(plate.mesh.rotation);
            });
        }

        function buildVoidPhantomGroup() {
            const mesh = new THREE.Group();
            const shardMat = new THREE.MeshBasicMaterial({ color: 0x120818, transparent: true, opacity: 0.9 });
            const shardEdge = new THREE.LineBasicMaterial({ color: 0x6644aa, transparent: true, opacity: 0.95 });
            const shards = [];
            const shardConfigs = [
                [0.55, 0.85, 0.32, 0, 1.05, 0.05, 0.1, 0, 0],
                [0.42, 0.7, 0.28, -0.28, 0.95, 0.08, -0.15, 0.1, 0.2],
                [0.4, 0.65, 0.26, 0.3, 0.92, -0.05, 0.18, -0.08, -0.15],
                [0.35, 0.55, 0.22, -0.12, 1.35, 0.12, 0.08, 0.25, 0.1],
                [0.32, 0.5, 0.2, 0.14, 1.28, -0.1, -0.12, 0.18, 0.12],
                [0.48, 0.45, 0.3, -0.38, 0.55, -0.08, 0.35, -0.1, 0.05]
            ];
            shardConfigs.forEach(([w, h, d, x, y, z, rx, ry, rz]) => {
                const geo = new THREE.BoxGeometry(w, h, d);
                const part = new THREE.Mesh(geo, shardMat);
                const wire = new THREE.LineSegments(new THREE.EdgesGeometry(geo), shardEdge);
                part.position.set(x, y, z);
                wire.position.copy(part.position);
                part.rotation.set(rx, ry, rz);
                wire.rotation.copy(part.rotation);
                mesh.add(part, wire);
                shards.push({ mesh: part, wire, base: { x, y, z, rx, ry, rz } });
            });

            const core = new THREE.Mesh(
                new THREE.SphereGeometry(0.28, 10, 10),
                new THREE.MeshBasicMaterial({ color: 0xcc55ff, transparent: true, opacity: 0.95 })
            );
            core.position.set(0, 1.05, 0.18);
            const coreWire = new THREE.LineSegments(
                new THREE.EdgesGeometry(new THREE.SphereGeometry(0.34, 8, 8)),
                new THREE.LineBasicMaterial({ color: 0xee99ff, transparent: true, opacity: 0.85 })
            );
            coreWire.position.copy(core.position);

            const bladeMat = new THREE.LineBasicMaterial({ color: 0xdd66ff, transparent: true, opacity: 0.98 });
            const bladeL = new THREE.LineSegments(
                new THREE.EdgesGeometry(new THREE.BoxGeometry(0.08, 2.2, 0.08)),
                bladeMat
            );
            bladeL.position.set(-0.62, 0.85, 0.22);
            bladeL.rotation.set(0.45, 0, 0.5);
            const bladeR = new THREE.LineSegments(
                new THREE.EdgesGeometry(new THREE.BoxGeometry(0.07, 2.0, 0.07)),
                bladeMat
            );
            bladeR.position.set(0.68, 0.88, -0.12);
            bladeR.rotation.set(0.35, 0.12, -0.42);

            mesh.add(core, coreWire, bladeL, bladeR);
            return { mesh, core, coreWire, shards, bladeL, bladeR };
        }

        function buildVoidTitanGroup() {
            const mesh = new THREE.Group();
            const floatY = 13;

            const core = new THREE.Mesh(
                new THREE.SphereGeometry(1.15, 14, 14),
                new THREE.MeshBasicMaterial({ color: 0xcc44ff, transparent: true, opacity: 0.92 })
            );
            core.position.set(0, 0.5, 0);
            const coreWire = new THREE.LineSegments(
                new THREE.EdgesGeometry(new THREE.SphereGeometry(1.28, 10, 10)),
                new THREE.LineBasicMaterial({ color: 0xee99ff, transparent: true, opacity: 0.8 })
            );
            coreWire.position.copy(core.position);

            const pyramidShell = new THREE.Mesh(
                new THREE.ConeGeometry(3.6, 5.5, 4),
                new THREE.MeshBasicMaterial({ color: 0x08040c, transparent: true, opacity: 0.55 })
            );
            pyramidShell.rotation.x = Math.PI;
            pyramidShell.position.y = 1.2;

            const plateMat = new THREE.MeshBasicMaterial({ color: 0x1a1028, transparent: true, opacity: 0.88 });
            const plateEdge = new THREE.LineBasicMaterial({ color: 0x7755bb, transparent: true, opacity: 0.95 });
            const plates = [];
            const plateConfigs = [
                { pos: [0, 2.4, 2.0], rot: [0.55, 0, 0], norm: [0, 0, 1] },
                { pos: [0, 2.4, -2.0], rot: [-0.55, 0, 0], norm: [0, 0, -1] },
                { pos: [2.0, 2.4, 0], rot: [0, 0, -0.55], norm: [1, 0, 0] },
                { pos: [-2.0, 2.4, 0], rot: [0, 0, 0.55], norm: [-1, 0, 0] },
                { pos: [1.4, 3.6, 1.4], rot: [0.35, 0.45, 0], norm: [0.6, 0.2, 0.6] },
                { pos: [-1.4, 3.6, 1.4], rot: [0.35, -0.45, 0], norm: [-0.6, 0.2, 0.6] },
                { pos: [1.4, 3.6, -1.4], rot: [-0.35, 0.45, 0], norm: [0.6, 0.2, -0.6] },
                { pos: [-1.4, 3.6, -1.4], rot: [-0.35, -0.45, 0], norm: [-0.6, 0.2, -0.6] }
            ];
            plateConfigs.forEach(cfg => {
                const geo = new THREE.BoxGeometry(1.6, 1.1, 0.18);
                const part = new THREE.Mesh(geo, plateMat);
                const wire = new THREE.LineSegments(new THREE.EdgesGeometry(geo), plateEdge);
                part.position.set(...cfg.pos);
                wire.position.copy(part.position);
                part.rotation.set(...cfg.rot);
                wire.rotation.copy(part.rotation);
                mesh.add(part, wire);
                plates.push({
                    mesh: part,
                    wire,
                    base: part.position.clone(),
                    baseRot: part.rotation.clone(),
                    normal: new THREE.Vector3(...cfg.norm).normalize()
                });
            });

            const tentacles = [];
            for (let i = 0; i < 6; i += 1) {
                const angle = (Math.PI * 2 / 6) * i + 0.2;
                const built = buildVoidTentacle(9, 0xaa55ff);
                built.group.position.set(Math.cos(angle) * 2.8, -0.5, Math.sin(angle) * 2.8);
                built.group.rotation.y = angle + Math.PI;
                built.baseAngle = angle;
                built.charged = false;
                mesh.add(built.group);
                tentacles.push(built);
            }

            const ringFill = new THREE.Mesh(
                new THREE.TorusGeometry(7.8, 0.22, 8, 64),
                new THREE.MeshBasicMaterial({ color: 0x220838, transparent: true, opacity: 0.72 })
            );
            const ringWire = new THREE.LineSegments(
                new THREE.EdgesGeometry(new THREE.TorusGeometry(7.85, 0.26, 6, 48)),
                new THREE.LineBasicMaterial({ color: 0xcc55ff, transparent: true, opacity: 0.95 })
            );
            ringFill.rotation.x = Math.PI / 2;
            ringWire.rotation.copy(ringFill.rotation);
            const horizonRing = new THREE.Group();
            horizonRing.add(ringFill, ringWire);

            mesh.add(pyramidShell, core, coreWire, horizonRing);
            return {
                mesh, core, coreWire, pyramidShell, plates, tentacles,
                horizonRing, ringFill, ringWire, floatY
            };
        }

        function clampBossPos(pos) {
            pos.x = Math.max(-FLOOR_LIMIT + 2, Math.min(FLOOR_LIMIT - 2, pos.x));
            pos.z = Math.max(-FLOOR_LIMIT + 2, Math.min(FLOOR_LIMIT - 2, pos.z));
        }

        function morphVoidPhantomToTitan() {
            const b = activeBoss;
            if (!b || b.titanReady) return;
            const pos = b.mesh.position.clone();
            const scale = b.mesh.scale.x;
            scene.remove(b.mesh);
            clearVoidPhantomExtras();

            const titan = buildVoidTitanGroup();
            titan.mesh.position.copy(pos);
            titan.mesh.scale.setScalar(scale);
            scene.add(titan.mesh);

            Object.assign(b, {
                mesh: titan.mesh,
                core: titan.core,
                coreWire: titan.coreWire,
                pyramidShell: titan.pyramidShell,
                plates: titan.plates,
                tentacles: titan.tentacles,
                horizonRing: titan.horizonRing,
                ringFill: titan.ringFill,
                ringWire: titan.ringWire,
                floatY: titan.floatY,
                voidPhase: 2,
                titanReady: true,
                hp: 2400,
                maxHp: 2400,
                movePhase: 'idle',
                attackMode: 'slam',
                attackTimer: 4,
                coreExposed: false,
                slamIndex: 0,
                slamTimer: 0,
                slamPhase: 'telegraph',
                slamZones: ['left', 'center', 'right'],
                slamTentacles: [1, 2, 4],
                barrageTimer: 0,
                barrageShotTimer: 0,
                barrageAngle: 0
            });
            delete b.shards;
            delete b.bladeL;
            delete b.bladeR;
            updateBossBar();
        }

        function startVoidAscension() {
            if (voidTransformActive || !activeBoss || activeBoss.voidPhase !== 1) return;
            voidTransformActive = true;
            voidTransformPhase = 'dialogue';
            voidTransformTimer = 3;
            activeBoss.hp = 0;
            updateBossBar();
            clearBossExtras();
            enemies.forEach(e => scene.remove(e.mesh));
            enemies = [];
            startCinematicDialogue(activeBoss.transformDialogue, true, () => {
                voidTransformPhase = 'ascend';
                voidTransformTimer = 3;
            });
        }

        function updateVoidTransform(rawDt) {
            if (!voidTransformActive) return;
            if (voidTransformPhase === 'dialogue') {
                updateCinematicDialogue(rawDt);
                return;
            }
            if (voidTransformPhase !== 'ascend' || !activeBoss) return;

            voidTransformTimer -= rawDt;
            const progress = 1 - voidTransformTimer / 3;
            if (progress > 0.28 && !activeBoss.titanReady) morphVoidPhantomToTitan();

            if (activeBoss.mesh) {
                activeBoss.mesh.position.x = THREE.MathUtils.lerp(activeBoss.mesh.position.x, 0, rawDt * 1.6);
                activeBoss.mesh.position.z = THREE.MathUtils.lerp(activeBoss.mesh.position.z, 0, rawDt * 1.6);
                activeBoss.mesh.position.y = THREE.MathUtils.lerp(
                    activeBoss.mesh.position.y,
                    activeBoss.floatY,
                    rawDt * 0.9
                );
                activeBoss.mesh.scale.setScalar(THREE.MathUtils.lerp(0.18, 1, Math.min(1, progress * 1.25)));
            }

            if (voidTransformTimer <= 0) {
                voidTransformActive = false;
                voidTransformPhase = 'idle';
                if (activeBoss) {
                    activeBoss.mesh.position.set(0, activeBoss.floatY, 0);
                    activeBoss.mesh.scale.setScalar(1);
                    activeBoss.movePhase = 'idle';
                    activeBoss.attackTimer = 4;
                }
            }
        }

        function updateVoidPhantomShards(b, time) {
            (b.shards || []).forEach((shard, i) => {
                shard.mesh.position.set(
                    shard.base.x + Math.sin(time * 2 + i) * 0.04,
                    shard.base.y + Math.cos(time * 1.8 + i) * 0.035,
                    shard.base.z + Math.sin(time * 1.5 + i) * 0.04
                );
                shard.wire.position.copy(shard.mesh.position);
            });
            if (b.core) b.core.material.opacity = 0.7 + Math.sin(time * 4) * 0.25;
        }

        function voidPhantomTeleportNearPlayer() {
            const b = activeBoss;
            const side = Math.random() > 0.5 ? 1 : -1;
            const back = Math.random() > 0.45;
            const dist = 3.2 + Math.random() * 1.5;
            const angle = yaw + (back ? Math.PI : 0) + side * (0.55 + Math.random() * 0.5);
            b.mesh.position.set(
                playerPos.x + Math.sin(angle) * dist,
                FLOOR_Y + 2.1,
                playerPos.z + Math.cos(angle) * dist
            );
            clampBossPos(b.mesh.position);
        }

        function spawnVoidMeleeSlash(fromPos, dir) {
            const mesh = new THREE.Mesh(
                new THREE.BoxGeometry(2.8, 0.18, 0.55),
                new THREE.MeshBasicMaterial({ color: 0xff1133, transparent: true, opacity: 0.82 })
            );
            mesh.position.copy(fromPos);
            mesh.lookAt(fromPos.clone().add(dir));
            scene.add(mesh);
            voidMeleeSlashes.push({
                mesh,
                vel: dir.clone().multiplyScalar(34),
                life: 0.42,
                width: 1.6,
                hit: false
            });
        }

        function beginVoidBlinkStrike() {
            const b = activeBoss;
            b.movePhase = 'blink';
            b.blinkPhase = 'charge';
            b.blinkTimer = 0;
            (b.shards || []).forEach(s => { s.mesh.material.color.setHex(0xff1133); });
        }

        function beginVoidMirrorDash() {
            const b = activeBoss;
            b.movePhase = 'mirror';
            b.mirrorTimer = 0;
            b.mirrorThrust = false;
            const forward = new THREE.Vector3(-Math.sin(yaw), 0, -Math.cos(yaw));
            const right = new THREE.Vector3(Math.cos(yaw), 0, -Math.sin(yaw));
            voidDecoys = [];
            [-1, 1].forEach(side => {
                const geo = new THREE.BoxGeometry(0.7, 1.6, 0.35);
                const wire = new THREE.LineSegments(
                    new THREE.EdgesGeometry(geo),
                    new THREE.LineBasicMaterial({ color: 0xaa55ff, transparent: true, opacity: 0.55 })
                );
                wire.position.copy(b.mesh.position);
                scene.add(wire);
                voidDecoys.push({
                    mesh: wire,
                    vel: forward.clone().multiplyScalar(28).add(right.clone().multiplyScalar(side * 14)),
                    life: 0.9
                });
            });
            const flank = right.clone().multiplyScalar(Math.random() > 0.5 ? 10 : -10);
            b.mesh.position.add(flank);
            clampBossPos(b.mesh.position);
        }

        function updateVoidMeleeSlashes(dt) {
            voidMeleeSlashes = voidMeleeSlashes.filter(slash => {
                slash.mesh.position.add(slash.vel.clone().multiplyScalar(dt));
                slash.life -= dt;

                if (player.isParrying && !slash.parryHandled) {
                    const ms = parryAnimTimer * 1000;
                    if (ms >= 31 && ms <= 70 && slash.mesh.position.distanceTo(getParryHitCenter()) < slash.width) {
                        slash.parryHandled = true;
                        triggerParrySuccess(slash.mesh.position.clone());
                        if (activeBoss && activeBoss.voidPhase === 1) {
                            activeBoss.stunTimer = 1;
                            damageBoss(0, 'parry');
                        }
                        scene.remove(slash.mesh);
                        return false;
                    }
                }

                if (!slash.hit && slash.mesh.position.distanceTo(playerPos) < slash.width && player.hp > 0) {
                    slash.hit = true;
                    player.hp -= 28;
                    triggerDirectionalHitFlash(slash.mesh.position);
                    if (player.hp <= 0) gameOver();
                    else updateUI();
                }

                if (slash.life <= 0) {
                    scene.remove(slash.mesh);
                    return false;
                }
                return true;
            });
        }

        function updateVoidDecoys(dt) {
            voidDecoys = voidDecoys.filter(d => {
                d.mesh.position.add(d.vel.clone().multiplyScalar(dt));
                d.life -= dt;
                d.mesh.material.opacity = Math.max(0, d.life) * 0.55;
                if (d.life <= 0) {
                    scene.remove(d.mesh);
                    return false;
                }
                return true;
            });
        }

        function updateVoidPhantomBoss(dt) {
            const b = activeBoss;
            const time = performance.now() * 0.001;

            if (b.stunTimer > 0) {
                b.stunTimer -= dt;
                if (b.stunTimer <= 0) b.movePhase = 'idle';
            }

            updateVoidPhantomShards(b, time);
            b.mesh.lookAt(playerPos.x, b.mesh.position.y, playerPos.z);
            updateVoidMeleeSlashes(dt);
            updateVoidDecoys(dt);

            if (b.movePhase === 'blink') {
                b.blinkTimer += dt;
                if (b.blinkPhase === 'charge' && b.blinkTimer >= 0.35) {
                    voidPhantomTeleportNearPlayer();
                    b.blinkPhase = 'slash';
                    b.blinkTimer = 0;
                    const slashDir = new THREE.Vector3().subVectors(playerPos, b.mesh.position);
                    slashDir.y = 0;
                    slashDir.normalize();
                    spawnVoidMeleeSlash(b.mesh.position.clone().add(new THREE.Vector3(0, 0.6, 0)), slashDir);
                } else if (b.blinkPhase === 'slash' && b.blinkTimer >= 0.55) {
                    (b.shards || []).forEach(s => { s.mesh.material.color.setHex(0x120818); });
                    b.movePhase = 'idle';
                    b.attackTimer = 4.5;
                }
                return;
            }

            if (b.movePhase === 'mirror') {
                b.mirrorTimer += dt;
                if (b.mirrorTimer >= 0.75 && !b.mirrorThrust) {
                    b.mirrorThrust = true;
                    const dir = new THREE.Vector3().subVectors(playerPos, b.mesh.position).normalize();
                    const mesh = new THREE.Mesh(
                        new THREE.BoxGeometry(0.35, 0.35, 1.6),
                        new THREE.MeshBasicMaterial({ color: 0xcc44ff, transparent: true, opacity: 0.9 })
                    );
                    mesh.position.copy(b.mesh.position);
                    scene.add(mesh);
                    projectiles.push({
                        mesh,
                        vel: dir.multiplyScalar(48),
                        owner: 'enemy',
                        life: 1.2,
                        fromBoss: true
                    });
                }
                if (b.mirrorTimer >= 1.4) {
                    b.movePhase = 'idle';
                    b.mirrorThrust = false;
                    voidDecoys.forEach(d => scene.remove(d.mesh));
                    voidDecoys = [];
                    b.attackTimer = 4.5;
                }
                return;
            }

            b.teleportTimer = (b.teleportTimer || 0) - dt;
            if (b.teleportTimer <= 0 && b.movePhase === 'idle') {
                voidPhantomTeleportNearPlayer();
                b.teleportTimer = 1.4 + Math.random() * 0.8;
            }

            b.attackTimer -= dt;
            if (b.attackTimer <= 0.55 && b.attackTimer > 0 && !b.attackWarned) {
                playVoidAttackWarning();
                b.attackWarned = true;
            }
            if (b.attackTimer > 0.6) b.attackWarned = false;

            if (b.attackTimer <= 0 && b.movePhase === 'idle') {
                if (b.attackMode === 'blink') {
                    beginVoidBlinkStrike();
                    b.attackMode = 'mirror';
                } else {
                    beginVoidMirrorDash();
                    b.attackMode = 'blink';
                }
            }
        }

        function shuffleSlamZones() {
            const zones = ['left', 'center', 'right'];
            for (let i = zones.length - 1; i > 0; i -= 1) {
                const j = Math.floor(Math.random() * (i + 1));
                [zones[i], zones[j]] = [zones[j], zones[i]];
            }
            return zones;
        }

        function beginVoidSlam() {
            if (!activeBoss || activeBoss.type !== 'void') return;
            const b = activeBoss;
            b.movePhase = 'slam';
            b.slamIndex = 0;
            b.slamTimer = 0;
            b.slamPhase = 'telegraph';
            b.slamZones = shuffleSlamZones();
            b.slamTentacles = [1, 2, 4];
            setTentacleCharge(b.tentacles, b.slamTentacles, true);
            playVoidAttackWarning();
            spawnSlamIndicator(b.slamZones[0]);
        }

        function resolveVoidSlamImpact(b, zone) {
            if (playerInSlamZone(zone)) {
                player.hp -= 38;
                const pos = getSlamZonePos(zone);
                triggerDirectionalHitFlash(new THREE.Vector3(pos.x, playerPos.y, pos.z));
                screenShake = 0.65;
                if (player.hp <= 0) gameOver();
                else updateUI();
            }
            voidSlamZones.forEach(z => {
                if (z.mesh) scene.remove(z.mesh);
                if (z.glow) scene.remove(z.glow);
            });
            voidSlamZones = [];
        }

        function updateVoidSlam(dt) {
            const b = activeBoss;
            b.slamTimer += dt;
            const zone = b.slamZones[b.slamIndex];
            const tentacle = b.tentacles[b.slamTentacles[b.slamIndex]];

            if (b.slamPhase === 'telegraph') {
                animateTentacleSlam(tentacle, zone, false);
                voidSlamZones.forEach(z => {
                    z.mesh.material.opacity = 0.35 + Math.sin(performance.now() * 0.02) * 0.25;
                    z.glow.material.opacity = 0.22 + Math.sin(performance.now() * 0.018) * 0.18;
                });
                if (b.slamTimer >= 0.65) {
                    b.slamPhase = 'impact';
                    b.slamTimer = 0;
                    animateTentacleSlam(tentacle, zone, true);
                    resolveVoidSlamImpact(b, zone);
                }
                return false;
            }

            if (b.slamPhase === 'impact') {
                if (b.slamTimer >= 0.18) {
                    b.slamIndex += 1;
                    b.slamTimer = 0;
                    if (b.slamIndex >= 3) return true;
                    b.slamPhase = 'telegraph';
                    spawnSlamIndicator(b.slamZones[b.slamIndex]);
                }
            }
            return false;
        }

            ));

            const dir = new THREE.Vector3().subVectors(target, spawn).normalize();
