<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neon Kill — Arcade Arena</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #000;
            font-family: 'Courier New', Courier, monospace;
            color: #eef8ff;
        }
        #gameRoot { position: relative; width: 100%; height: 100%; }
        canvas { display: block; width: 100%; height: 100%; }
        #ui {
            position: absolute;
            inset: 0;
            pointer-events: none;
            padding: 24px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }
        .ui-top {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }
        .ui-bottom {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
        }
        .panel {
            background: rgba(0, 0, 0, 0.55);
            border: 1px solid rgba(255, 0, 127, 0.45);
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.15);
            padding: 14px 18px;
            min-width: 160px;
        }
        .label {
            font-size: 10px;
            letter-spacing: 0.2em;
            color: #00ffff;
            text-transform: uppercase;
            margin-bottom: 6px;
        }
        .health-val {
            font-size: 2.4rem;
            font-weight: bold;
            color: #ff007f;
            text-shadow: 0 0 12px rgba(255, 0, 127, 0.6);
        }
        .score-val, .wave-val {
            font-size: 1.8rem;
            font-weight: bold;
            color: #fff;
        }
        .style-rank {
            font-size: 1.5rem;
            font-weight: bold;
            color: #00ffff;
            text-shadow: 0 0 14px rgba(0, 255, 255, 0.5);
        }
        .style-mult {
            font-size: 0.95rem;
            color: #ff007f;
            margin-top: 4px;
        }
        #crosshair {
            position: fixed;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            width: 0;
            height: 0;
            pointer-events: none;
            z-index: 6;
        }
        #crosshair .dot {
            position: absolute;
            width: 4px;
            height: 4px;
            left: -2px;
            top: -2px;
            background: #00ffcc;
            border-radius: 50%;
            box-shadow: 0 0 8px #00ffcc, 0 0 14px rgba(0, 255, 204, 0.45);
        }
        #crosshair .tick {
            position: absolute;
            background: rgba(0, 255, 204, 0.9);
            box-shadow: 0 0 5px rgba(0, 255, 204, 0.7);
        }
        #crosshair .tick.top { width: 2px; height: 9px; left: -1px; top: -16px; }
        #crosshair .tick.bottom { width: 2px; height: 9px; left: -1px; top: 7px; }
        #crosshair .tick.left { width: 9px; height: 2px; left: -16px; top: -1px; }
        #crosshair .tick.right { width: 9px; height: 2px; left: 7px; top: -1px; }
        #parryFlash {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 7;
            opacity: 0;
            background: radial-gradient(circle at center, rgba(255, 255, 255, 0.95) 0%, rgba(0, 255, 255, 0.55) 45%, rgba(255, 255, 255, 0.15) 100%);
            transition: opacity 0.05s linear;
        }
        #parryFlash.solid { background: #ffffff; }
        #startScreen, #gameOverScreen {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 16px;
            background: rgba(0, 0, 0, 0.82);
            pointer-events: auto;
            text-align: center;
            padding: 24px;
        }
        #gameOverScreen { display: none; }
        h1 {
            font-size: clamp(2rem, 6vw, 3.5rem);
            letter-spacing: 0.25em;
            color: #ff007f;
            text-shadow: 0 0 24px rgba(255, 0, 127, 0.5);
        }
        .hint { max-width: 520px; line-height: 1.6; color: #b8c4d8; font-size: 14px; }
        .btn {
            pointer-events: auto;
            cursor: pointer;
            padding: 12px 28px;
            border: 2px solid #00ffff;
            background: rgba(0, 255, 255, 0.1);
            color: #00ffff;
            font-family: inherit;
            font-size: 13px;
            letter-spacing: 0.15em;
            text-transform: uppercase;
        }
        .btn:hover { background: rgba(0, 255, 255, 0.25); }
        #backHub {
            position: absolute;
            top: 16px;
            left: 16px;
            pointer-events: auto;
            z-index: 10;
        }
        .hidden { display: none !important; }
        #bossHud {
            position: fixed;
            top: 24px;
            left: 50%;
            transform: translateX(-50%) translateY(-140%);
            width: min(560px, 78vw);
            display: none;
            pointer-events: none;
            z-index: 8;
            text-align: center;
            opacity: 0;
            transition: transform 0.45s cubic-bezier(0.22, 1, 0.36, 1), opacity 0.35s ease;
        }
        #bossHud.visible {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
        }
        #bossHud.glitch-in {
            animation: bossHudGlitch 0.55s ease forwards;
        }
        @keyframes bossHudGlitch {
            0% { transform: translateX(-50%) translateY(-140%); opacity: 0; filter: hue-rotate(0deg); }
            35% { transform: translateX(calc(-50% + 6px)) translateY(10px); opacity: 0.85; filter: hue-rotate(40deg); }
            55% { transform: translateX(calc(-50% - 4px)) translateY(2px); opacity: 1; }
            75% { transform: translateX(calc(-50% + 2px)) translateY(0); }
            100% { transform: translateX(-50%) translateY(0); opacity: 1; filter: hue-rotate(0deg); }
        }
        #bossName {
            font-size: 11px;
            letter-spacing: 0.32em;
            color: #ff2244;
            text-shadow: 0 0 12px rgba(255, 34, 68, 0.65), 0 0 24px rgba(255, 0, 60, 0.25);
            margin-bottom: 8px;
            text-transform: uppercase;
            font-weight: bold;
        }
        #bossBarTrack {
            width: 100%;
            height: 12px;
            background: rgba(0, 0, 0, 0.88);
            border: 1px solid rgba(255, 34, 68, 0.55);
            box-shadow: 0 0 22px rgba(255, 0, 60, 0.25), inset 0 0 12px rgba(0, 0, 0, 0.6);
        }
        #bossBarFill {
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, #ff0033, #ff2255, #ff4477);
            box-shadow: 0 0 16px rgba(255, 0, 51, 0.85);
            transform-origin: left center;
            transform: scaleX(1);
            transition: transform 0.12s linear;
        }
        #bossDialogue {
            position: fixed;
            left: 50%;
            bottom: 118px;
            transform: translateX(-50%);
            width: min(720px, 90vw);
            padding: 18px 22px;
            background: rgba(0, 0, 0, 0.78);
            border: 1px solid rgba(0, 255, 255, 0.45);
            box-shadow: 0 0 28px rgba(255, 0, 127, 0.18), inset 0 0 24px rgba(0, 255, 255, 0.06);
            display: none;
            pointer-events: none;
            z-index: 9;
            text-align: center;
        }
        #bossDialogue.visible { display: block; }
        #bossDialogueText {
            font-size: 13px;
            letter-spacing: 0.14em;
            line-height: 1.65;
            color: #d8f4ff;
            text-transform: uppercase;
            min-height: 1.6em;
        }
        #bossDialogueText::after {
            content: '▌';
            color: #00ffff;
            animation: dialogueBlink 0.8s step-end infinite;
        }
        #bossDialogue.done #bossDialogueText::after { content: ''; animation: none; }
        @keyframes dialogueBlink {
            50% { opacity: 0; }
        }
    </style>
</head>
<body>
    <div id="gameRoot">
        <button id="backHub" class="btn">← Hub</button>
        <div id="parryFlash"></div>
        <div id="crosshair" aria-hidden="true">
            <span class="dot"></span>
            <span class="tick top"></span>
            <span class="tick bottom"></span>
            <span class="tick left"></span>
            <span class="tick right"></span>
        </div>
        <div id="bossHud">
            <div id="bossName">WAVE 05 // APEX SENTRY</div>
            <div id="bossBarTrack"><div id="bossBarFill"></div></div>
        </div>
        <div id="bossDialogue">
            <div id="bossDialogueText"></div>
        </div>
        <div id="ui">
            <div class="ui-top">
                <div class="panel">
                    <div class="label">Wave</div>
                    <div class="wave-val" id="waveDisplay">1</div>
                </div>
                <div class="panel">
                    <div class="label">Score</div>
                    <div class="score-val" id="scoreDisplay">0</div>
                </div>
            </div>
            <div class="ui-bottom">
                <div class="panel">
                    <div class="label">Health</div>
                    <div class="health-val" id="healthDisplay">100</div>
                </div>
                <div class="panel" style="text-align: right;">
                    <div class="label">Style</div>
                    <div class="style-rank" id="rankDisplay">DULL</div>
                    <div class="style-mult" id="multDisplay">×1.0</div>
                </div>
            </div>
        </div>
        <div id="startScreen">
            <h1>NEON KILL</h1>
            <p class="hint">Click to lock pointer. WASD move · Space jump/slam · Shift slide · Tap LMB shoot · Hold LMB charge pierce · RMB/E parry.<br>Parry reflects shots for 3× damage. Kill enemies to absorb heal particles.</p>
            <button class="btn" id="startBtn">Enter Arena</button>
        </div>
        <div id="gameOverScreen">
            <h1>TERMINATED</h1>
            <p class="hint" id="finalStats"></p>
            <button class="btn" id="retryBtn">Retry</button>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
    (() => {
        let score = 0;
        let styleMultiplier = 1.0;
        let styleRank = 'DULL';
        let wave = 1;
        let player = {
            hp: 100,
            maxHp: 100,
            isSliding: false,
            isParrying: false,
            canDash: true,
            canBeLaunched: true,
            vel: { y: 0 },
            onPad: false
        };

        let hasOverclockCore = false;
        let hasSiphonNanites = false;
        let hasSlamModule = false;

        window.NeonKillSetup = {
            enableOverclockCore: () => { hasOverclockCore = true; },
            enableSiphonNanites: () => { hasSiphonNanites = true; },
            enableSlamModule: () => { hasSlamModule = true; }
        };

        try {
            const saved = JSON.parse(sessionStorage.getItem('neonKillUpgrades') || '{}');
            if (saved.overclock) window.NeonKillSetup.enableOverclockCore();
            if (saved.siphon) window.NeonKillSetup.enableSiphonNanites();
            if (saved.slam) window.NeonKillSetup.enableSlamModule();
        } catch (_) {}

        const ARENA = 40;
        const FLOOR_Y = 0;
        const EYE_HEIGHT = 1.65;
        const SLIDE_HEIGHT = EYE_HEIGHT * 0.5;
        const BASE_SPEED = 14;
        const GRAVITY = 38;
        const JUMP_V = 13;

        let gameRunning = false;
        let pointerLocked = false;
        let yaw = 0;
        let pitch = 0;
        let velY = 0;
        let onGround = true;
        let isSlamming = false;
        let parryTimer = 0;
        let parryAnimTimer = 0;
        let shootCooldown = 0;
        let gunRecoil = 0;
        let freezeTimer = 0;
        let flashTimer = 0;
        let screenShake = 0;
        let isCharging = false;
        let chargeLevel = 0;
        let parryBursts = [];
        let beamEffects = [];
        let laserWalls = [];
        let shockwaves = [];
        let trackingLaser = null;
        let enemies = [];
        let projectiles = [];
        let healParticles = [];
        let keys = {};
        let mouseDown = { left: false, right: false };
        let isBossWave = false;
        let activeBoss = null;
        let bossIntroActive = false;
        let typewriterChars = 0;
        let typewriterDone = false;
        let introHoldTimer = 2;
        let introDialogueLine = '';

        const PLAYER_SHOT_DAMAGE = 25;
        const PARRY_SHOT_DAMAGE = PLAYER_SHOT_DAMAGE * 3;
        const PIERCE_DAMAGE = 55;
        const BOSS_PRIMARY_DMG = 5;
        const BOSS_PARRY_DMG = 95;
        const BOSS_PIERCE_DMG = 140;
        const CHASM_Y = -10;
        const JUMP_PAD_VEL = 35;
        const FLOOR_LIMIT = ARENA - 0.85;

        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x050008);
        scene.fog = new THREE.Fog(0x050008, 20, 90);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 200);

        const viewFlags = { depthTest: false, depthWrite: false, fog: false };
        const metalDark = new THREE.MeshBasicMaterial({ color: 0x2a2f35, ...viewFlags });
        const metalMid = new THREE.MeshBasicMaterial({ color: 0x3d454d, ...viewFlags });
        const metalLight = new THREE.MeshBasicMaterial({ color: 0x4a525a, ...viewFlags });
        const metalEdge = new THREE.LineBasicMaterial({ color: 0x667788, transparent: true, opacity: 0.8, ...viewFlags });
        const cyanSlotMat = new THREE.MeshBasicMaterial({ color: 0x00ffff, ...viewFlags });
        const armFillMat = new THREE.MeshBasicMaterial({ color: 0xff007f, transparent: true, opacity: 0.02, ...viewFlags });
        const armWireMat = new THREE.LineBasicMaterial({ color: 0xff007f, transparent: true, opacity: 0.95, ...viewFlags });

        const REVOLVER_BASE = { x: 0.35, y: -0.35, z: -0.7 };
        const parryRestPos = new THREE.Vector3(-0.5, -0.4, -0.6);
        const parryWindPos = new THREE.Vector3(-0.52, -0.41, -0.52);
        const parryStrikePos = new THREE.Vector3(0.1, -0.32, -0.36);
        const parryWindRot = { x: 0, y: -0.28, z: 0 };
        const parryStrikeRot = { x: -0.15, y: 0.18, z: Math.PI / 4 };

        function addSolidWithEdges(geo, fillMat, edgeMat) {
            const mesh = new THREE.Mesh(geo, fillMat);
            const wire = new THREE.LineSegments(new THREE.EdgesGeometry(geo), edgeMat);
            const g = new THREE.Group();
            g.add(mesh, wire);
            return g;
        }

        function addWireHologram(geo) {
            const mesh = new THREE.Mesh(geo, armFillMat);
            const wire = new THREE.LineSegments(new THREE.EdgesGeometry(geo), armWireMat);
            const g = new THREE.Group();
            g.add(mesh, wire);
            return g;
        }

        const batteryCanvas = document.createElement('canvas');
        batteryCanvas.width = 64;
        batteryCanvas.height = 32;
        const batteryCtx = batteryCanvas.getContext('2d');
        const batteryTexture = new THREE.CanvasTexture(batteryCanvas);
        const batteryMat = new THREE.MeshBasicMaterial({ map: batteryTexture, ...viewFlags });

        function drawBatteryHUD() {
            const ctx = batteryCtx;
            const w = batteryCanvas.width;
            const h = batteryCanvas.height;
            ctx.clearRect(0, 0, w, h);
            ctx.fillStyle = '#0a1018';
            ctx.fillRect(0, 0, w, h);

            let color = '#00ffff';
            if (isCharging && chargeLevel > 0) {
                if (chargeLevel >= 100) color = '#ff2200';
                else color = Math.sin(performance.now() * 0.025) > 0 ? '#ff8800' : '#ff4400';
            }

            ctx.strokeStyle = color;
            ctx.lineWidth = 2;
            ctx.strokeRect(4, 7, 46, 18);
            ctx.fillStyle = color;
            ctx.fillRect(50, 12, 5, 8);

            const segments = 4;
            const filled = Math.ceil((chargeLevel / 100) * segments);
            for (let i = 0; i < segments; i++) {
                ctx.fillStyle = i < filled ? color : '#1a2530';
                ctx.fillRect(8 + i * 10, 10, 7, 12);
            }
            batteryTexture.needsUpdate = true;
        }

        const cyberRevolver = new THREE.Group();

        const topStrap = addSolidWithEdges(new THREE.BoxGeometry(0.28, 0.06, 0.12), metalMid, metalEdge);
        topStrap.position.set(0.02, 0.1, 0.02);
        const receiver = addSolidWithEdges(new THREE.BoxGeometry(0.26, 0.14, 0.18), metalDark, metalEdge);
        receiver.position.set(0, 0.02, 0);
        const grip = addSolidWithEdges(new THREE.BoxGeometry(0.11, 0.26, 0.14), metalDark, metalEdge);
        grip.position.set(-0.03, -0.16, 0.03);
        grip.rotation.z = 0.12;
        const triggerGuard = addSolidWithEdges(new THREE.BoxGeometry(0.08, 0.08, 0.1), metalLight, metalEdge);
        triggerGuard.position.set(0.02, -0.06, 0.04);

        const chamberGeo = new THREE.CylinderGeometry(0.09, 0.09, 0.1, 8);
        const chamber = new THREE.Mesh(chamberGeo, metalDark);
        chamber.rotation.x = Math.PI / 2;
        chamber.position.set(0.04, 0.04, -0.02);
        const chamberWire = new THREE.LineSegments(new THREE.EdgesGeometry(chamberGeo), metalEdge);
        chamberWire.rotation.copy(chamber.rotation);
        chamberWire.position.copy(chamber.position);
        for (let i = 0; i < 6; i++) {
            const slot = new THREE.Mesh(new THREE.BoxGeometry(0.018, 0.04, 0.022), cyanSlotMat);
            const angle = (Math.PI * 2 / 6) * i;
            slot.position.set(
                0.04 + Math.cos(angle) * 0.092,
                0.04,
                -0.02 + Math.sin(angle) * 0.092
            );
            cyberRevolver.add(slot);
        }

        const barrelLen = 0.42;
        const heavyBarrel = addSolidWithEdges(new THREE.BoxGeometry(0.1, 0.1, barrelLen), metalMid, metalEdge);
        heavyBarrel.position.set(0.04, 0.04, -0.08 - barrelLen * 0.5);
        const barrelShroud = addSolidWithEdges(new THREE.BoxGeometry(0.14, 0.06, barrelLen * 0.55), metalDark, metalEdge);
        barrelShroud.position.set(0.04, 0.1, -0.1 - barrelLen * 0.28);

        const muzzlePoint = new THREE.Object3D();
        muzzlePoint.position.set(0.04, 0.04, -0.08 - barrelLen);

        const batteryHUD = new THREE.Mesh(new THREE.PlaneGeometry(0.09, 0.045), batteryMat);
        batteryHUD.position.set(-0.05, 0.08, 0.1);
        batteryHUD.rotation.set(-0.55, 0.15, 0);

        cyberRevolver.add(topStrap, receiver, grip, triggerGuard, chamber, chamberWire, heavyBarrel, barrelShroud, muzzlePoint, batteryHUD);
        cyberRevolver.position.set(REVOLVER_BASE.x, REVOLVER_BASE.y, REVOLVER_BASE.z);
        cyberRevolver.rotation.set(-0.1, 0.04, 0.02);
        cyberRevolver.renderOrder = 999;
        camera.add(cyberRevolver);
        drawBatteryHUD();

        const armGroup = new THREE.Group();

        const forearmGeo = new THREE.BoxGeometry(0.38, 0.11, 0.12);
        const forearm = addWireHologram(forearmGeo);
        forearm.position.set(-0.06, 0, 0);

        const fistGeo = new THREE.BoxGeometry(0.2, 0.18, 0.16);
        const fist = addWireHologram(fistGeo);
        fist.position.set(0.22, 0.01, 0.02);

        armGroup.add(forearm, fist);
        armGroup.visible = false;
        armGroup.position.copy(parryRestPos);
        armGroup.renderOrder = 1000;
        camera.add(armGroup);

        scene.add(camera);

        const parryFlashEl = document.getElementById('parryFlash');
        const bossHudEl = document.getElementById('bossHud');
        const bossNameEl = document.getElementById('bossName');
        const bossBarFillEl = document.getElementById('bossBarFill');
        const bossDialogueEl = document.getElementById('bossDialogue');
        const bossDialogueTextEl = document.getElementById('bossDialogueText');
        const PARRY_WINDOW = 0.2;
        const PARRY_ANIM_MS = 150;
        const PARRY_FLASH_DECAY = 0.15;
        const TAP_HOLD_THRESHOLD = 0.16;
        const CHARGE_RATE = 112;

        let audioCtx = null;
        let leftHoldTime = 0;
        let chargeCommitted = false;
        function initAudio() {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if (audioCtx.state === 'suspended') audioCtx.resume();
            return audioCtx;
        }

        function playShootSound() {
            const ctx = initAudio();
            const t = ctx.currentTime;
            const osc = ctx.createOscillator();
            const gain = ctx.createGain();
            osc.type = 'sawtooth';
            osc.frequency.setValueAtTime(800, t);
            osc.frequency.exponentialRampToValueAtTime(100, t + 0.1);
            gain.gain.setValueAtTime(0.18, t);
            gain.gain.exponentialRampToValueAtTime(0.001, t + 0.1);
            osc.connect(gain);
            gain.connect(ctx.destination);
            osc.start(t);
            osc.stop(t + 0.11);
        }

        function playParryImpactSound() {
            const ctx = initAudio();
            const t = ctx.currentTime;
            const osc = ctx.createOscillator();
            osc.type = 'sine';
            osc.frequency.setValueAtTime(1400, t);
            osc.frequency.exponentialRampToValueAtTime(900, t + 0.08);
            const gain = ctx.createGain();
            gain.gain.setValueAtTime(0.55, t);
            gain.gain.exponentialRampToValueAtTime(0.001, t + 0.22);
            osc.connect(gain);
            gain.connect(ctx.destination);
            osc.start(t);
            osc.stop(t + 0.24);
        }

        function playPierceBlastSound() {
            const ctx = initAudio();
            const t = ctx.currentTime;
            const master = ctx.createGain();
            master.gain.setValueAtTime(0.7, t);
            master.connect(ctx.destination);

            const osc = ctx.createOscillator();
            osc.type = 'sawtooth';
            osc.frequency.setValueAtTime(140, t);
            osc.frequency.exponentialRampToValueAtTime(35, t + 0.45);
            const oscGain = ctx.createGain();
            oscGain.gain.setValueAtTime(0.45, t);
            oscGain.gain.exponentialRampToValueAtTime(0.001, t + 0.5);
            osc.connect(oscGain);
            oscGain.connect(master);
            osc.start(t);
            osc.stop(t + 0.52);

            const nLen = Math.floor(ctx.sampleRate * 0.2);
            const nBuf = ctx.createBuffer(1, nLen, ctx.sampleRate);
            const nd = nBuf.getChannelData(0);
            for (let i = 0; i < nLen; i++) nd[i] = (Math.random() * 2 - 1) * (1 - i / nLen);
            const noise = ctx.createBufferSource();
            noise.buffer = nBuf;
            const filter = ctx.createBiquadFilter();
            filter.type = 'lowpass';
            filter.frequency.setValueAtTime(900, t);
            filter.frequency.exponentialRampToValueAtTime(80, t + 0.35);
            const nGain = ctx.createGain();
            nGain.gain.setValueAtTime(0.35, t);
            nGain.gain.exponentialRampToValueAtTime(0.001, t + 0.4);
            noise.connect(filter);
            filter.connect(nGain);
            nGain.connect(master);
            noise.start(t);
            noise.stop(t + 0.42);
        }

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        document.getElementById('gameRoot').insertBefore(renderer.domElement, document.getElementById('gameRoot').firstChild);

        scene.add(new THREE.AmbientLight(0x331144, 0.6));
        const keyLight = new THREE.PointLight(0xff007f, 1.2, 80);
        keyLight.position.set(0, 12, 0);
        scene.add(keyLight);
        const fill = new THREE.PointLight(0x00ffff, 0.8, 80);
        fill.position.set(-20, 8, 20);
        scene.add(fill);

        const gridHelper = new THREE.GridHelper(ARENA * 2, 32, 0xff007f, 0x220044);
        gridHelper.material.opacity = 0.45;
        gridHelper.material.transparent = true;
        scene.add(gridHelper);

        const floorGeo = new THREE.PlaneGeometry(ARENA * 2, ARENA * 2);
        const floorMat = new THREE.MeshBasicMaterial({ color: 0x0a0018, transparent: true, opacity: 0.88 });
        const floor = new THREE.Mesh(floorGeo, floorMat);
        floor.rotation.x = -Math.PI / 2;
        scene.add(floor);

        const wallMat = new THREE.LineBasicMaterial({ color: 0xff007f, transparent: true, opacity: 0.22 });
        const boundaryWalls = [];
        const wallHeight = 14;
        const wallThickness = 0.35;
        [
            [0, -ARENA, ARENA * 2, wallThickness],
            [0, ARENA, ARENA * 2, wallThickness],
            [-ARENA, 0, wallThickness, ARENA * 2],
            [ARENA, 0, wallThickness, ARENA * 2]
        ].forEach(([x, z, w, d]) => {
            const geo = new THREE.BoxGeometry(w, wallHeight, d);
            const wire = new THREE.LineSegments(new THREE.EdgesGeometry(geo), wallMat);
            wire.position.set(x, wallHeight * 0.5, z);
            scene.add(wire);
            boundaryWalls.push({ x, z, halfW: w * 0.5, halfD: d * 0.5 });
        });

        const jumpPads = [];
        const padMat = new THREE.MeshBasicMaterial({ color: 0x44ff88, transparent: true, opacity: 0.55, side: THREE.DoubleSide });
        const padEdge = new THREE.LineBasicMaterial({ color: 0x88ffaa });
        const padCorners = [
            [ARENA * 0.72, ARENA * 0.72],
            [-ARENA * 0.72, ARENA * 0.72],
            [ARENA * 0.72, -ARENA * 0.72],
            [-ARENA * 0.72, -ARENA * 0.72]
        ];
        padCorners.forEach(([x, z]) => {
            const geo = new THREE.ConeGeometry(2.4, 0.18, 3);
            const pad = new THREE.Mesh(geo, padMat);
            pad.rotation.x = -Math.PI / 2;
            pad.position.set(x, 0.1, z);
            const wire = new THREE.LineSegments(new THREE.EdgesGeometry(geo), padEdge);
            wire.rotation.copy(pad.rotation);
            wire.position.copy(pad.position);
            scene.add(pad, wire);
            jumpPads.push({ x, z, radius: 2.2, pad, wire });
        });

        const pillars = [];
        const pillarSpots = [
            [ARENA * 0.35, ARENA * 0.35, 0],
            [-ARENA * 0.35, ARENA * 0.35, 1.4],
            [ARENA * 0.35, -ARENA * 0.35, 2.8],
            [-ARENA * 0.35, -ARENA * 0.35, 4.2]
        ];
        pillarSpots.forEach(([x, z, phase]) => {
            const h = 10;
            const geo = new THREE.BoxGeometry(3, h, 3);
            const edges = new THREE.EdgesGeometry(geo);
            const mesh = new THREE.LineSegments(edges, new THREE.LineBasicMaterial({ color: 0x00ffff }));
            mesh.position.set(x, h * 0.5, z);
            scene.add(mesh);
            pillars.push({ mesh, x, z, half: 1.7, h, phase, baseY: h * 0.5, amp: 3.5 });
        });

        const playerPos = new THREE.Vector3(0, FLOOR_Y + EYE_HEIGHT, 0);

        function speedMult() { return hasOverclockCore ? 1.25 : 1; }

        function getAimDirection() {
            return new THREE.Vector3(0, 0, -1).applyQuaternion(camera.quaternion).normalize();
        }

        function getMuzzleWorldPosition() {
            const pos = new THREE.Vector3();
            muzzlePoint.getWorldPosition(pos);
            return pos;
        }

        function updateStyleRank() {
            if (styleMultiplier >= 3.5) styleRank = 'SUPREME';
            else if (styleMultiplier >= 2.0) styleRank = 'CHAOTIC';
            else styleRank = 'DULL';
        }

        function updateUI() {
            document.getElementById('healthDisplay').textContent = Math.max(0, Math.ceil(player.hp));
            document.getElementById('scoreDisplay').textContent = score;
            document.getElementById('waveDisplay').textContent = wave;
            document.getElementById('rankDisplay').textContent = styleRank;
            document.getElementById('multDisplay').textContent = '×' + styleMultiplier.toFixed(1);
        }

        function spawnEnemy(type, x, z) {
            let mesh, hp = type === 'drone' ? 30 : 50;
            if (type === 'drone') {
                const geo = new THREE.IcosahedronGeometry(1.2, 0);
                const wire = new THREE.LineSegments(new THREE.EdgesGeometry(geo), new THREE.LineBasicMaterial({ color: 0xff007f }));
                const core = new THREE.Mesh(new THREE.SphereGeometry(0.35, 8, 8), new THREE.MeshBasicMaterial({ color: 0xff007f }));
                mesh = new THREE.Group();
                mesh.add(wire);
                mesh.add(core);
                mesh.position.set(x, 5, z);
            } else {
                const geo = new THREE.ConeGeometry(0.9, 2.2, 4);
                const wire = new THREE.LineSegments(new THREE.EdgesGeometry(geo), new THREE.LineBasicMaterial({ color: 0x00ffff }));
                const core = new THREE.Mesh(new THREE.SphereGeometry(0.3, 8, 8), new THREE.MeshBasicMaterial({ color: 0x00ffff }));
                mesh = new THREE.Group();
                mesh.add(wire);
                mesh.add(core);
                mesh.position.set(x, 1.1, z);
            }
            scene.add(mesh);
            enemies.push({
                type, mesh, hp, maxHp: hp,
                shootTimer: 1 + Math.random() * 2,
                speed: type === 'husk' ? 7 : 5
            });
        }

        function bossWaveLabel(name) {
            return `WAVE ${String(wave).padStart(2, '0')} // ${name}`;
        }

        function updateBossBar() {
            if (!activeBoss) {
                hideBossHud();
                return;
            }
            bossHudEl.style.display = 'block';
            bossNameEl.textContent = activeBoss.label || bossWaveLabel(activeBoss.name);
            const pct = Math.max(0, activeBoss.hp / activeBoss.maxHp);
            bossBarFillEl.style.transform = `scaleX(${pct})`;
        }

        function showBossHud() {
            bossHudEl.style.display = 'block';
            bossHudEl.classList.remove('visible', 'glitch-in');
            void bossHudEl.offsetWidth;
            bossHudEl.classList.add('visible', 'glitch-in');
            updateBossBar();
        }

        function hideBossHud() {
            bossHudEl.classList.remove('visible', 'glitch-in');
            bossHudEl.style.display = 'none';
        }

        function showBossDialogue() {
            bossDialogueEl.classList.add('visible');
            bossDialogueEl.classList.remove('done');
            bossDialogueTextEl.textContent = '';
        }

        function hideBossDialogue() {
            bossDialogueEl.classList.remove('visible', 'done');
            bossDialogueTextEl.textContent = '';
        }

        function startBossIntro(boss) {
            bossIntroActive = true;
            introHoldTimer = 2;
            typewriterChars = 0;
            typewriterDone = false;
            introDialogueLine = boss.dialogue || '';
            showBossDialogue();
            showBossHud();
        }

        function updateBossDialogue(rawDt) {
            if (!bossIntroActive) return;
            introHoldTimer = Math.max(0, introHoldTimer - rawDt);

            if (!typewriterDone) {
                typewriterChars += rawDt * 38;
                const shown = introDialogueLine.slice(0, Math.floor(typewriterChars));
                bossDialogueTextEl.textContent = shown;
                if (shown.length >= introDialogueLine.length) {
                    typewriterDone = true;
                    bossDialogueEl.classList.add('done');
                }
                return;
            }

            if (introHoldTimer <= 0) {
                bossIntroActive = false;
                hideBossDialogue();
            }
        }

        function clearLaserWalls() {
            laserWalls.forEach(w => scene.remove(w.mesh));
            laserWalls = [];
        }

        function clearShockwaves() {
            shockwaves.forEach(s => scene.remove(s.mesh));
            shockwaves = [];
        }

        function clearTrackingLaser() {
            if (trackingLaser) {
                scene.remove(trackingLaser.mesh);
                trackingLaser = null;
            }
        }

        function clearBossExtras() {
            clearLaserWalls();
            clearShockwaves();
            clearTrackingLaser();
        }

        function addWireBox(w, h, d, color = 0xff2244) {
            const geo = new THREE.BoxGeometry(w, h, d);
            const wire = new THREE.LineSegments(
                new THREE.EdgesGeometry(geo),
                new THREE.LineBasicMaterial({ color, transparent: true, opacity: 0.95 })
            );
            return wire;
        }

        function spawnApexSentry() {
            const geo = new THREE.DodecahedronGeometry(3.8, 0);
            const plateMat = new THREE.MeshBasicMaterial({
                color: 0x2a3038,
                transparent: true,
                opacity: 0.92
            });
            const coreGeo = new THREE.DodecahedronGeometry(2.2, 0);
            const coreMat = new THREE.MeshBasicMaterial({
                color: 0xff1133,
                transparent: true,
                opacity: 0.55
            });
            const seamMat = new THREE.LineBasicMaterial({ color: 0xff5577, transparent: true, opacity: 0.95 });
            const wire = new THREE.LineSegments(new THREE.EdgesGeometry(geo), seamMat);
            const plates = new THREE.Mesh(geo, plateMat);
            const core = new THREE.Mesh(coreGeo, coreMat);
            const coreWire = new THREE.LineSegments(new THREE.EdgesGeometry(coreGeo), new THREE.LineBasicMaterial({ color: 0xff88aa }));
            const mesh = new THREE.Group();
            mesh.add(plates, wire, core, coreWire);
            mesh.position.set(0, 8, 0);
            scene.add(mesh);

            activeBoss = {
                type: 'apex',
                name: 'APEX SENTRY',
                label: bossWaveLabel('APEX SENTRY'),
                dialogue: 'CRITICAL ERROR... INTRUDER THREAD SPOTTED... PURGING SYSTEM...',
                mesh,
                core,
                hp: 1200,
                maxHp: 1200,
                mode: 'projectiles',
                modeTimer: 7,
                shootTimer: 0,
                isBoss: true
            };
            startBossIntro(activeBoss);
        }

        function spawnVoidOblivion() {
            const mesh = new THREE.Group();
            const wireColor = 0xcc66ff;
            const torso = addWireBox(1.3, 2.4, 0.9, wireColor);
            torso.position.y = 2.3;
            const head = addWireBox(0.95, 0.95, 0.95, wireColor);
            head.position.y = 4.1;
            const armL = addWireBox(0.35, 2.1, 0.35, wireColor);
            armL.position.set(-1.05, 2.5, 0);
            const armR = addWireBox(0.35, 2.1, 0.35, wireColor);
            armR.position.set(1.05, 2.5, 0);
            const legL = addWireBox(0.42, 2.3, 0.42, wireColor);
            legL.position.set(-0.45, 0.35, 0);
            const legR = addWireBox(0.42, 2.3, 0.42, wireColor);
            legR.position.set(0.45, 0.35, 0);
            mesh.add(torso, head, armL, armR, legL, legR);
            mesh.position.set(0, 0, 0);
            mesh.scale.set(2.2, 2.2, 2.2);
            scene.add(mesh);

            activeBoss = {
                type: 'void',
                name: 'THE VOID OBLIVION',
                label: bossWaveLabel('THE VOID OBLIVION'),
                dialogue: 'YOU ARE A GHOST IN OUR MACHINE. WELCOME TO THE END OF THE LINE.',
                mesh,
                hp: 2200,
                maxHp: 2200,
                teleportTimer: 3.5,
                shockTimer: 2.8,
                laserTimer: 6,
                laserActive: false,
                laserCharge: 0,
                glitchTimer: 0,
                isBoss: true
            };
            startBossIntro(activeBoss);
        }

        function spawnBoss() {
            isBossWave = true;
            enemies = [];
            clearBossExtras();
            if (wave % 10 === 0) spawnVoidOblivion();
            else spawnApexSentry();
        }

        function bossShootAtPlayer() {
            if (!activeBoss) return;
            const dir = new THREE.Vector3().subVectors(playerPos, activeBoss.mesh.position).normalize();
            const mesh = new THREE.Mesh(
                new THREE.SphereGeometry(0.26, 6, 6),
                new THREE.MeshBasicMaterial({ color: 0xff1133 })
            );
            mesh.position.copy(activeBoss.mesh.position);
            scene.add(mesh);
            projectiles.push({ mesh, vel: dir.multiplyScalar(26), owner: 'enemy', life: 6, fromBoss: true });
        }

        function spawnBossLaserWall() {
            const geo = new THREE.BoxGeometry(ARENA * 2.4, 0.28, 1.4);
            const mat = new THREE.MeshBasicMaterial({ color: 0xff0033, transparent: true, opacity: 0.72 });
            const mesh = new THREE.Mesh(geo, mat);
            mesh.position.set(0, 1.05, -ARENA * 0.95);
            scene.add(mesh);
            laserWalls.push({ mesh, velZ: 24, life: 5 });
        }

        function spawnShockwave(x, z) {
            const geo = new THREE.RingGeometry(0.8, 1.5, 36);
            geo.rotateX(-Math.PI / 2);
            const mat = new THREE.MeshBasicMaterial({
                color: 0xcc66ff,
                transparent: true,
                opacity: 0.72,
                side: THREE.DoubleSide
            });
            const mesh = new THREE.Mesh(geo, mat);
            mesh.position.set(x, 0.12, z);
            scene.add(mesh);
            shockwaves.push({ mesh, radius: 1.5, speed: 16, life: 4, width: 1.4 });
        }

        function startTrackingLaser() {
            clearTrackingLaser();
            const geo = new THREE.BoxGeometry(0.55, 0.55, 1);
            const mat = new THREE.MeshBasicMaterial({ color: 0xff00cc, transparent: true, opacity: 0.82 });
            const mesh = new THREE.Mesh(geo, mat);
            scene.add(mesh);
            trackingLaser = { mesh, active: true, duration: 3.2 };
        }

        function updateTrackingLaser(dt) {
            if (!trackingLaser || !activeBoss || activeBoss.type !== 'void') return;
            trackingLaser.duration -= dt;
            if (trackingLaser.duration <= 0) {
                clearTrackingLaser();
                if (activeBoss) activeBoss.laserActive = false;
                return;
            }

            const origin = activeBoss.mesh.position.clone();
            origin.y += 4.5;
            const target = playerPos.clone();
            const dir = new THREE.Vector3().subVectors(target, origin);
            const len = dir.length();
            if (len < 0.01) return;
            dir.normalize();

            trackingLaser.mesh.scale.set(1, 1, len);
            trackingLaser.mesh.position.copy(origin).add(dir.clone().multiplyScalar(len * 0.5));
            trackingLaser.mesh.lookAt(target);

            const distToBeam = distPointToRay(playerPos, origin, dir);
            if (distToBeam < 0.75 && player.hp > 0) {
                player.hp -= 28 * dt;
                if (player.hp <= 0) gameOver();
            }
        }

        function updateShockwaves(dt) {
            shockwaves = shockwaves.filter(s => {
                s.life -= dt;
                s.radius += s.speed * dt;
                s.mesh.scale.set(s.radius / 1.5, s.radius / 1.5, 1);
                s.mesh.material.opacity = Math.max(0, s.life / 4) * 0.72;

                const dx = playerPos.x - s.mesh.position.x;
                const dz = playerPos.z - s.mesh.position.z;
                const dist = Math.hypot(dx, dz);
                const band = s.width;
                if (onGround && Math.abs(dist - s.radius) < band && player.hp > 0) {
                    player.hp -= 34 * dt;
                    if (player.hp <= 0) gameOver();
                }

                if (s.life <= 0 || s.radius > ARENA * 1.2) {
                    scene.remove(s.mesh);
                    return false;
                }
                return true;
            });
        }

        function teleportVoidBoss() {
            if (!activeBoss || activeBoss.type !== 'void') return;
            const quadrants = [
                [ARENA * 0.55, ARENA * 0.55],
                [-ARENA * 0.55, ARENA * 0.55],
                [ARENA * 0.55, -ARENA * 0.55],
                [-ARENA * 0.55, -ARENA * 0.55]
            ];
            const [x, z] = quadrants[Math.floor(Math.random() * quadrants.length)];
            activeBoss.mesh.position.set(x, 0, z);
            activeBoss.glitchTimer = 0.35;
            activeBoss.mesh.scale.set(0.1, 3.5, 0.1);
        }

        function updateApexBoss(dt) {
            const b = activeBoss;
            b.mesh.position.y = 8 + Math.sin(performance.now() * 0.0012) * 0.9;
            b.mesh.rotation.x += dt * 0.25;
            b.mesh.rotation.y += dt * 0.45;
            if (b.core) {
                const pulse = 0.45 + Math.sin(performance.now() * 0.004) * 0.25;
                b.core.material.opacity = pulse;
                b.core.rotation.y -= dt * 0.8;
            }

            b.modeTimer -= dt;
            if (b.modeTimer <= 0) {
                b.mode = b.mode === 'projectiles' ? 'laserwall' : 'projectiles';
                b.modeTimer = 7.5;
                if (b.mode === 'laserwall') spawnBossLaserWall();
            }

            if (b.mode === 'projectiles') {
                b.shootTimer -= dt;
                if (b.shootTimer <= 0) {
                    bossShootAtPlayer();
                    b.shootTimer = 0.11;
                }
            }
        }

        function updateVoidBoss(dt) {
            const b = activeBoss;
            if (b.glitchTimer > 0) {
                b.glitchTimer -= dt;
                const t = Math.max(0, b.glitchTimer / 0.35);
                b.mesh.scale.set(
                    THREE.MathUtils.lerp(2.2, 0.1, 1 - t),
                    THREE.MathUtils.lerp(2.2, 3.5, 1 - t),
                    THREE.MathUtils.lerp(2.2, 0.1, 1 - t)
                );
            } else {
                b.mesh.scale.set(2.2, 2.2, 2.2);
            }

            b.mesh.lookAt(playerPos.x, b.mesh.position.y + 4, playerPos.z);
            b.mesh.position.y = Math.sin(performance.now() * 0.0015) * 0.15;

            b.teleportTimer -= dt;
            if (b.teleportTimer <= 0) {
                teleportVoidBoss();
                b.teleportTimer = 4.5 + Math.random() * 2;
            }

            b.shockTimer -= dt;
            if (b.shockTimer <= 0) {
                spawnShockwave(b.mesh.position.x, b.mesh.position.z);
                b.shockTimer = 2.6 + Math.random() * 1.4;
            }

            b.laserTimer -= dt;
            if (b.laserTimer <= 0 && !b.laserActive) {
                b.laserActive = true;
                b.laserTimer = 7.5;
                startTrackingLaser();
            }

            updateTrackingLaser(dt);
            updateShockwaves(dt);
        }

        function updateLaserWalls(dt) {
            laserWalls = laserWalls.filter(w => {
                w.life -= dt;
                w.mesh.position.z += w.velZ * dt;
                if (Math.abs(playerPos.z - w.mesh.position.z) < 1.1 &&
                    Math.abs(playerPos.y - w.mesh.position.y) < 1.2 &&
                    Math.abs(playerPos.x) < ARENA * 0.95 && player.hp > 0) {
                    player.hp -= 22 * dt;
                    if (player.hp <= 0) gameOver();
                }
                if (w.life <= 0 || w.mesh.position.z > ARENA * 1.1) {
                    scene.remove(w.mesh);
                    return false;
                }
                return true;
            });
        }

        function updateBoss(dt) {
            if (!activeBoss || bossIntroActive) return;
            if (activeBoss.type === 'void') updateVoidBoss(dt);
            else updateApexBoss(dt);
            updateLaserWalls(dt);
            updateBossBar();
        }

        function damageBoss(amt, source) {
            if (!activeBoss) return;
            let dmg = amt;
            if (source === 'primary') dmg = BOSS_PRIMARY_DMG;
            else if (source === 'parry') dmg = BOSS_PARRY_DMG;
            else if (source === 'pierce') dmg = BOSS_PIERCE_DMG;
            activeBoss.hp -= dmg;
            updateBossBar();
            if (activeBoss.hp <= 0) killBoss();
        }

        function killBoss() {
            if (!activeBoss) return;
            screenShake = 1.25;
            styleMultiplier = Math.min(8, styleMultiplier + 1.0);
            score += Math.floor(500 * styleMultiplier);
            const pos = activeBoss.mesh.position.clone();
            scene.remove(activeBoss.mesh);
            activeBoss = null;
            isBossWave = false;
            hideBossHud();
            hideBossDialogue();
            bossIntroActive = false;
            clearBossExtras();
            for (let i = 0; i < 6; i++) {
                const m = new THREE.Mesh(
                    new THREE.SphereGeometry(0.18, 6, 6),
                    new THREE.MeshBasicMaterial({ color: 0x44ff88 })
                );
                m.position.copy(pos);
                scene.add(m);
                healParticles.push({ mesh: m, life: 4 });
            }
            wave += 1;
            spawnWave();
        }

        function spawnWave() {
            enemies.forEach(e => scene.remove(e.mesh));
            enemies = [];
            clearBossExtras();
            activeBoss = null;
            isBossWave = false;
            bossIntroActive = false;
            hideBossHud();
            hideBossDialogue();

            if (wave % 5 === 0) {
                spawnBoss();
                return;
            }

            const count = wave * 3;
            for (let i = 0; i < count; i++) {
                const type = Math.random() < 0.45 ? 'drone' : 'husk';
                const angle = Math.random() * Math.PI * 2;
                const dist = 14 + Math.random() * (ARENA * 0.55);
                spawnEnemy(type, Math.cos(angle) * dist, Math.sin(angle) * dist);
            }
        }

        function shootPlayer() {
            if (shootCooldown > 0) return;
            shootCooldown = 0.18;
            gunRecoil = 0.08;
            playShootSound();
            const dir = getAimDirection();
            const speed = 55 * speedMult();
            const mesh = new THREE.Mesh(
                new THREE.SphereGeometry(0.18, 6, 6),
                new THREE.MeshBasicMaterial({ color: 0x00ffff })
            );
            mesh.position.copy(getMuzzleWorldPosition());
            scene.add(mesh);
            projectiles.push({
                mesh, vel: dir.clone().multiplyScalar(speed), owner: 'player',
                life: 3, damage: PLAYER_SHOT_DAMAGE
            });
        }

        function distPointToRay(point, origin, dir) {
            const v = point.clone().sub(origin);
            const t = v.dot(dir);
            if (t < 0 || t > 90) return Infinity;
            const closest = origin.clone().add(dir.clone().multiplyScalar(t));
            return closest.distanceTo(point);
        }

        function firePierceShot() {
            const origin = getMuzzleWorldPosition();
            const dir = getAimDirection();
            const maxDist = 90;
            playPierceBlastSound();
            screenShake = 0.45;
            styleMultiplier = Math.min(8, styleMultiplier + 0.4);

            const beamGeo = new THREE.CylinderGeometry(0.2, 0.12, maxDist, 10);
            const beamMat = new THREE.MeshBasicMaterial({ color: 0x00ffff, transparent: true, opacity: 0.85 });
            const beam = new THREE.Mesh(beamGeo, beamMat);
            beam.quaternion.setFromUnitVectors(new THREE.Vector3(0, 1, 0), dir);
            beam.position.copy(origin).add(dir.clone().multiplyScalar(maxDist * 0.5));
            scene.add(beam);
            beamEffects.push({ mesh: beam, life: 0.18 });

            const hitSet = new Set();
            for (const enemy of enemies) {
                if (distPointToRay(enemy.mesh.position, origin, dir) < 1.8) hitSet.add(enemy);
            }
            hitSet.forEach(enemy => damageEnemy(enemy, PIERCE_DAMAGE, !onGround));
            if (activeBoss && distPointToRay(activeBoss.mesh.position, origin, dir) < (activeBoss.type === 'void' ? 5.5 : 4.5)) {
                damageBoss(BOSS_PIERCE_DMG, 'pierce');
            }
        }

        function releaseLeftMouse() {
            if (chargeCommitted || leftHoldTime >= TAP_HOLD_THRESHOLD) {
                if (chargeLevel >= 100) firePierceShot();
            } else {
                shootPlayer();
            }
            chargeLevel = 0;
            isCharging = false;
            chargeCommitted = false;
            leftHoldTime = 0;
            drawBatteryHUD();
        }

        function updateLeftMouse(dt) {
            if (!mouseDown.left || !gameRunning || player.isParrying) return;
            leftHoldTime += dt;
            if (leftHoldTime >= TAP_HOLD_THRESHOLD) {
                chargeCommitted = true;
                isCharging = true;
                chargeLevel = Math.min(100, chargeLevel + dt * CHARGE_RATE);
                drawBatteryHUD();
            }
        }

        function enemyShoot(enemy) {
            const dir = new THREE.Vector3().subVectors(playerPos, enemy.mesh.position).normalize();
            const mesh = new THREE.Mesh(
                new THREE.SphereGeometry(0.22, 6, 6),
                new THREE.MeshBasicMaterial({ color: 0xff2244 })
            );
            mesh.position.copy(enemy.mesh.position);
            scene.add(mesh);
            projectiles.push({ mesh, vel: dir.multiplyScalar(22), owner: 'enemy', life: 5 });
        }

        function startParry() {
            if (player.isParrying || isCharging) return;
            player.isParrying = true;
            parryTimer = PARRY_WINDOW;
            parryAnimTimer = 0;
            armGroup.visible = true;
            armGroup.position.copy(parryRestPos);
            armGroup.rotation.set(0, 0, 0);
        }

        function getParryHitCenter() {
            const center = new THREE.Vector3();
            armGroup.getWorldPosition(center);
            const forward = getAimDirection();
            return center.add(forward.multiplyScalar(0.35));
        }

        function triggerParrySuccess(impactPos) {
            freezeTimer = 0.1;
            flashTimer = PARRY_FLASH_DECAY;
            parryFlashEl.classList.add('solid');
            parryFlashEl.style.opacity = '1';
            playParryImpactSound();
            styleMultiplier = Math.min(8, styleMultiplier + 0.5);
            for (let i = 0; i < 16; i++) {
                const angle = (Math.PI * 2 / 16) * i + Math.random() * 0.4;
                const mesh = new THREE.Mesh(
                    new THREE.SphereGeometry(0.08 + Math.random() * 0.06, 4, 4),
                    new THREE.MeshBasicMaterial({ color: Math.random() > 0.5 ? 0xffffff : 0x00ffff })
                );
                mesh.position.copy(impactPos);
                scene.add(mesh);
                const spread = new THREE.Vector3(
                    Math.cos(angle) * (2 + Math.random() * 4),
                    (Math.random() - 0.5) * 3,
                    Math.sin(angle) * (2 + Math.random() * 4)
                );
                parryBursts.push({ mesh, vel: spread, life: 0.35 + Math.random() * 0.15 });
            }
        }

        function lerpRot(a, b, t) {
            armGroup.rotation.x = THREE.MathUtils.lerp(a.x, b.x, t);
            armGroup.rotation.y = THREE.MathUtils.lerp(a.y, b.y, t);
            armGroup.rotation.z = THREE.MathUtils.lerp(a.z, b.z, t);
        }

        function updateParryArm(dt) {
            if (!player.isParrying) {
                armGroup.visible = false;
                armGroup.position.copy(parryRestPos);
                armGroup.rotation.set(0, 0, 0);
                return;
            }

            armGroup.visible = true;
            parryAnimTimer += dt;
            const ms = parryAnimTimer * 1000;

            if (ms <= 30) {
                const p = ms / 30;
                armGroup.position.lerpVectors(parryRestPos, parryWindPos, p);
                lerpRot({ x: 0, y: 0, z: 0 }, parryWindRot, p);
            } else if (ms <= 70) {
                const p = (ms - 31) / 39;
                const eased = 1 - Math.pow(1 - p, 4);
                armGroup.position.lerpVectors(parryWindPos, parryStrikePos, eased);
                lerpRot(parryWindRot, parryStrikeRot, eased);
            } else if (ms <= PARRY_ANIM_MS) {
                const p = (ms - 71) / (PARRY_ANIM_MS - 71);
                armGroup.position.lerpVectors(parryStrikePos, parryRestPos, p);
                lerpRot(parryStrikeRot, { x: 0, y: 0, z: 0 }, p);
            } else {
                armGroup.visible = false;
                armGroup.position.copy(parryRestPos);
                armGroup.rotation.set(0, 0, 0);
            }
        }

        function updateWeaponRig(dt) {
            if (gunRecoil > 0) {
                gunRecoil = Math.max(0, gunRecoil - dt * 0.55);
                cyberRevolver.position.z = REVOLVER_BASE.z + gunRecoil * 0.35;
                cyberRevolver.rotation.x = -0.1 - gunRecoil * 0.6;
            } else {
                cyberRevolver.position.set(REVOLVER_BASE.x, REVOLVER_BASE.y, REVOLVER_BASE.z);
                cyberRevolver.rotation.x = -0.1;
            }
            if (isCharging) {
                const pulse = 1 + Math.sin(performance.now() * 0.018) * 0.015 * (chargeLevel / 100);
                batteryHUD.scale.set(pulse, pulse, 1);
            } else {
                batteryHUD.scale.set(1, 1, 1);
            }
            updateParryArm(dt);
        }

        function updateBeamEffects(dt) {
            beamEffects = beamEffects.filter(b => {
                b.life -= dt;
                b.mesh.material.opacity = Math.max(0, b.life / 0.18) * 0.85;
                if (b.life <= 0) {
                    scene.remove(b.mesh);
                    return false;
                }
                return true;
            });
        }

        function updateParryBursts(dt) {
            parryBursts = parryBursts.filter(b => {
                b.life -= dt;
                b.mesh.position.add(b.vel.clone().multiplyScalar(dt));
                b.vel.multiplyScalar(0.92);
                if (b.life <= 0) {
                    scene.remove(b.mesh);
                    return false;
                }
                return true;
            });
        }

        function updateFlash(dt) {
            if (flashTimer > 0) {
                flashTimer = Math.max(0, flashTimer - dt);
                parryFlashEl.style.opacity = String(Math.min(1, flashTimer / PARRY_FLASH_DECAY));
                if (flashTimer <= 0) parryFlashEl.classList.remove('solid');
            }
        }

        function applyScreenShake() {
            if (screenShake > 0) {
                camera.rotation.x += (Math.random() - 0.5) * screenShake * 0.06;
                camera.rotation.y += (Math.random() - 0.5) * screenShake * 0.06;
            }
        }

        function damageEnemy(enemy, amt, midAir) {
            enemy.hp -= amt;
            if (enemy.hp <= 0) {
                killEnemy(enemy, midAir);
            }
        }

        function killEnemy(enemy, midAir) {
            if (midAir) styleMultiplier = Math.min(8, styleMultiplier + 0.2);
            score += Math.floor(100 * styleMultiplier);
            const pos = enemy.mesh.position.clone();
            scene.remove(enemy.mesh);
            enemies = enemies.filter(e => e !== enemy);
            for (let i = 0; i < 3; i++) {
                const m = new THREE.Mesh(
                    new THREE.SphereGeometry(0.15, 6, 6),
                    new THREE.MeshBasicMaterial({ color: 0x44ff88 })
                );
                m.position.copy(pos);
                scene.add(m);
                healParticles.push({ mesh: m, life: 4 });
            }
            if (!isBossWave && !enemies.length) {
                wave += 1;
                spawnWave();
            }
        }

        function slamImpact() {
            const radius = 6;
            styleMultiplier = Math.min(8, styleMultiplier + 0.3);
            enemies.forEach(enemy => {
                const d = enemy.mesh.position.distanceTo(new THREE.Vector3(playerPos.x, enemy.mesh.position.y, playerPos.z));
                if (d < radius) damageEnemy(enemy, 40, false);
            });
            projectiles = projectiles.filter(p => {
                if (p.owner === 'enemy' && p.mesh.position.distanceTo(playerPos) < radius) {
                    scene.remove(p.mesh);
                    return false;
                }
                return true;
            });
        }

        function resetGame() {
            score = 0;
            styleMultiplier = 1.0;
            styleRank = 'DULL';
            wave = 1;
            player = {
                hp: 100,
                maxHp: 100,
                isSliding: false,
                isParrying: false,
                canDash: true,
                canBeLaunched: true,
                vel: { y: 0 },
                onPad: false
            };
            playerPos.set(0, FLOOR_Y + EYE_HEIGHT, 0);
            velY = 0;
            player.vel.y = 0;
            onGround = true;
            isSlamming = false;
            yaw = 0;
            pitch = 0;
            enemies.forEach(e => scene.remove(e.mesh));
            projectiles.forEach(p => scene.remove(p.mesh));
            healParticles.forEach(h => scene.remove(h.mesh));
            parryBursts.forEach(b => scene.remove(b.mesh));
            parryBursts = [];
            beamEffects.forEach(b => scene.remove(b.mesh));
            beamEffects = [];
            clearBossExtras();
            if (activeBoss) scene.remove(activeBoss.mesh);
            activeBoss = null;
            isBossWave = false;
            bossIntroActive = false;
            hideBossHud();
            hideBossDialogue();
            freezeTimer = 0;
            flashTimer = 0;
            screenShake = 0;
            isCharging = false;
            chargeLevel = 0;
            chargeCommitted = false;
            leftHoldTime = 0;
            parryFlashEl.style.opacity = '0';
            parryFlashEl.classList.remove('solid');
            parryAnimTimer = 0;
            gunRecoil = 0;
            drawBatteryHUD();
            enemies = [];
            projectiles = [];
            healParticles = [];
            spawnWave();
            updateUI();
        }

        function gameOver() {
            gameRunning = false;
            document.exitPointerLock?.();
            document.getElementById('finalStats').textContent = `Score ${score} · Wave ${wave} · Rank ${styleRank}`;
            document.getElementById('gameOverScreen').style.display = 'flex';
        }

        function clampArena() {
            playerPos.x = Math.max(-FLOOR_LIMIT, Math.min(FLOOR_LIMIT, playerPos.x));
            playerPos.z = Math.max(-FLOOR_LIMIT, Math.min(FLOOR_LIMIT, playerPos.z));
        }

        function onArenaFloor() {
            return Math.abs(playerPos.x) <= ARENA && Math.abs(playerPos.z) <= ARENA;
        }

        function updateShiftingPillars() {
            const t = performance.now() * 0.001;
            for (const p of pillars) {
                const y = p.baseY + Math.sin(t * 0.55 + p.phase) * p.amp;
                p.mesh.position.y = y;
            }
        }

        function checkJumpPads() {
            let onAnyPad = false;
            for (const pad of jumpPads) {
                const dx = playerPos.x - pad.x;
                const dz = playerPos.z - pad.z;
                const inside = dx * dx + dz * dz < pad.radius * pad.radius;
                if (inside) {
                    onAnyPad = true;
                    if (player.canBeLaunched) {
                        player.vel.y = JUMP_PAD_VEL;
                        velY = JUMP_PAD_VEL;
                        player.canBeLaunched = false;
                        onGround = false;
                    }
                }
            }

            if (!onAnyPad) {
                player.onPad = false;
            } else {
                player.onPad = true;
            }

            if ((!onAnyPad || onGround) && onArenaFloor() && playerPos.y <= FLOOR_Y + EYE_HEIGHT + 0.05) {
                player.canBeLaunched = true;
            }
        }

        function checkChasmFall() {
            if (onArenaFloor()) return;
            if (playerPos.y < CHASM_Y) {
                player.hp -= 15;
                playerPos.set(0, FLOOR_Y + EYE_HEIGHT, 0);
                velY = 0;
                player.vel.y = 0;
                player.canBeLaunched = true;
                if (player.hp <= 0) gameOver();
                else updateUI();
            }
        }

        function pillarCollision() {
            for (const p of pillars) {
                const px = p.mesh.position.x;
                const pz = p.mesh.position.z;
                if (Math.abs(playerPos.x - px) < p.half + 0.4 && Math.abs(playerPos.z - pz) < p.half + 0.4) {
                    const dx = playerPos.x - px;
                    const dz = playerPos.z - pz;
                    if (Math.abs(dx) > Math.abs(dz)) playerPos.x = px + Math.sign(dx) * (p.half + 0.45);
                    else playerPos.z = pz + Math.sign(dz) * (p.half + 0.45);
                }
            }
        }

        function updatePlayer(dt) {
            const forward = new THREE.Vector3(-Math.sin(yaw), 0, -Math.cos(yaw));
            const right = new THREE.Vector3(Math.cos(yaw), 0, -Math.sin(yaw));
            let move = new THREE.Vector3();
            if (keys.KeyW) move.add(forward);
            if (keys.KeyS) move.sub(forward);
            if (keys.KeyA) move.sub(right);
            if (keys.KeyD) move.add(right);
            if (move.lengthSq() > 0) move.normalize();

            let speed = BASE_SPEED * speedMult();
            if (player.isSliding) speed *= 1.4;

            playerPos.x += move.x * speed * dt;
            playerPos.z += move.z * speed * dt;
            clampArena();
            pillarCollision();

            if (isSlamming) {
                velY = -55;
                player.vel.y = velY;
            } else if (!onGround) {
                velY -= GRAVITY * dt;
                player.vel.y = velY;
            }

            playerPos.y += velY * dt;
            const groundY = FLOOR_Y + (player.isSliding ? SLIDE_HEIGHT : EYE_HEIGHT);

            if (onArenaFloor() && playerPos.y <= groundY) {
                if (!onGround && isSlamming) slamImpact();
                playerPos.y = groundY;
                velY = 0;
                player.vel.y = 0;
                onGround = true;
                isSlamming = false;
                if (!player.onPad) player.canBeLaunched = true;
            } else if (!onArenaFloor() || playerPos.y > groundY) {
                onGround = false;
            }

            checkJumpPads();
            checkChasmFall();

            if (parryTimer > 0) {
                parryTimer -= dt;
                if (parryTimer <= 0) player.isParrying = false;
            }
            if (shootCooldown > 0) shootCooldown -= dt;

            updateWeaponRig(dt);

            camera.position.copy(playerPos);
            camera.rotation.order = 'YXZ';
            camera.rotation.y = yaw;
            camera.rotation.x = pitch;
        }

        function updateEnemies(dt) {
            if (activeBoss) {
                updateBoss(dt);
                return;
            }
            for (const enemy of enemies) {
                if (enemy.type === 'drone') {
                    enemy.mesh.position.y = 5 + Math.sin(performance.now() * 0.002 + enemy.mesh.id) * 0.5;
                    enemy.shootTimer -= dt;
                    if (enemy.shootTimer <= 0) {
                        enemyShoot(enemy);
                        enemy.shootTimer = 3;
                    }
                } else {
                    const dir = new THREE.Vector3().subVectors(
                        new THREE.Vector3(playerPos.x, enemy.mesh.position.y, playerPos.z),
                        enemy.mesh.position
                    );
                    const dist = dir.length();
                    if (dist > 0.1) {
                        dir.normalize();
                        enemy.mesh.position.add(dir.multiplyScalar(enemy.speed * dt));
                        enemy.mesh.lookAt(playerPos.x, enemy.mesh.position.y, playerPos.z);
                    }
                    if (dist < 1.8 && player.hp > 0) {
                        player.hp -= 18 * dt;
                        if (player.hp <= 0) gameOver();
                    }
                }
            }
        }

        function updateProjectiles(dt) {
            projectiles = projectiles.filter(p => {
                p.mesh.position.add(p.vel.clone().multiplyScalar(dt));
                p.life -= dt;

                if (player.isParrying && p.owner === 'enemy') {
                    const ms = parryAnimTimer * 1000;
                    if (ms >= 31 && ms <= 70) {
                        const d = p.mesh.position.distanceTo(getParryHitCenter());
                        if (d < 1.5) {
                            const impact = p.mesh.position.clone();
                            p.vel.negate().multiplyScalar(1.5);
                            p.owner = 'player';
                            p.damage = PARRY_SHOT_DAMAGE;
                            if (p.fromBoss) p.bossParry = true;
                            triggerParrySuccess(impact);
                            return true;
                        }
                    }
                }

                if (p.owner === 'enemy' && p.mesh.position.distanceTo(playerPos) < 0.9 && player.hp > 0) {
                    player.hp -= 12;
                    scene.remove(p.mesh);
                    if (player.hp <= 0) gameOver();
                    return false;
                }

                if (p.owner === 'player') {
                    if (activeBoss && p.mesh.position.distanceTo(activeBoss.mesh.position) < (activeBoss.type === 'void' ? 5.5 : 4.2)) {
                        damageBoss(0, p.bossParry ? 'parry' : 'primary');
                        scene.remove(p.mesh);
                        return false;
                    }
                    for (const enemy of enemies) {
                        if (p.mesh.position.distanceTo(enemy.mesh.position) < 1.5) {
                            damageEnemy(enemy, p.damage || PLAYER_SHOT_DAMAGE, !onGround);
                            scene.remove(p.mesh);
                            return false;
                        }
                    }
                }

                if (Math.abs(p.mesh.position.x) > ARENA || Math.abs(p.mesh.position.z) > ARENA || p.life <= 0) {
                    scene.remove(p.mesh);
                    return false;
                }
                return true;
            });
        }

        function updateHealParticles(dt) {
            const healAmt = hasSiphonNanites ? 14 : 7;
            healParticles = healParticles.filter(h => {
                h.life -= dt;
                const dir = new THREE.Vector3().subVectors(playerPos, h.mesh.position);
                const dist = dir.length();
                if (dist < 0.6) {
                    player.hp = Math.min(player.maxHp, player.hp + healAmt);
                    scene.remove(h.mesh);
                    return false;
                }
                dir.normalize();
                h.mesh.position.add(dir.multiplyScalar(16 * dt));
                if (h.life <= 0) { scene.remove(h.mesh); return false; }
                return true;
            });
        }

        function updateStyle(dt) {
            styleMultiplier = Math.max(1, styleMultiplier - 0.005);
            updateStyleRank();
        }

        let last = performance.now();
        function loop(now) {
            requestAnimationFrame(loop);
            const rawDt = Math.min((now - last) / 1000, 0.05);
            last = now;
            const dt = (freezeTimer > 0 || bossIntroActive) ? 0 : rawDt;
            if (freezeTimer > 0) freezeTimer = Math.max(0, freezeTimer - rawDt);

            if (gameRunning) {
                updateBossDialogue(rawDt);
                updateLeftMouse(rawDt);
                updateShiftingPillars();
                updatePlayer(dt);
                applyScreenShake();
                if (screenShake > 0) screenShake = Math.max(0, screenShake - rawDt * 2.2);
                updateEnemies(dt);
                updateProjectiles(dt);
                updateHealParticles(dt);
                updateBeamEffects(rawDt);
                updateParryBursts(rawDt);
                updateFlash(rawDt);
                updateStyle(dt);
                updateUI();
            } else {
                updateFlash(rawDt);
                updateParryBursts(rawDt);
                updateBeamEffects(rawDt);
            }

            renderer.render(scene, camera);
        }
        requestAnimationFrame(loop);

        document.addEventListener('keydown', e => {
            keys[e.code] = true;
            if (!gameRunning) return;
            if (e.code === 'Space') {
                e.preventDefault();
                if (onGround) {
                    velY = JUMP_V;
                    player.vel.y = JUMP_V;
                    onGround = false;
                }
                else if (hasSlamModule && !isSlamming) isSlamming = true;
            }
            if (e.code === 'ShiftLeft' || e.code === 'ShiftRight') player.isSliding = true;
            if (e.code === 'KeyE') startParry();
        });
        document.addEventListener('keyup', e => {
            keys[e.code] = false;
            if (e.code === 'ShiftLeft' || e.code === 'ShiftRight') player.isSliding = false;
        });
        document.addEventListener('mousedown', e => {
            if (e.button === 0) {
                mouseDown.left = true;
                leftHoldTime = 0;
                chargeCommitted = false;
            }
            if (e.button === 2) {
                e.preventDefault();
                mouseDown.right = true;
                if (gameRunning) startParry();
            }
        });
        document.addEventListener('mouseup', e => {
            if (e.button === 0) {
                mouseDown.left = false;
                if (gameRunning) releaseLeftMouse();
            }
            if (e.button === 2) mouseDown.right = false;
        });
        document.addEventListener('contextmenu', e => e.preventDefault());

        renderer.domElement.addEventListener('click', () => {
            if (gameRunning) renderer.domElement.requestPointerLock();
        });
        document.addEventListener('pointerlockchange', () => {
            pointerLocked = document.pointerLockElement === renderer.domElement;
        });
        document.addEventListener('mousemove', e => {
            if (!pointerLocked || !gameRunning) return;
            yaw -= e.movementX * 0.002;
            pitch -= e.movementY * 0.002;
            pitch = Math.max(-1.2, Math.min(1.2, pitch));
        });

        function beginGame() {
            initAudio();
            resetGame();
            gameRunning = true;
            renderer.domElement.requestPointerLock();
        }

        document.getElementById('startBtn').addEventListener('click', () => {
            document.getElementById('startScreen').classList.add('hidden');
            beginGame();
        });
        document.getElementById('retryBtn').addEventListener('click', () => {
            document.getElementById('gameOverScreen').style.display = 'none';
            beginGame();
        });
        document.getElementById('backHub').addEventListener('click', () => {
            window.location.href = 'index.html';
        });

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    })();
    </script>
</body>
