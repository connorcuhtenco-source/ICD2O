        function beginVoidBarrage() {
            if (!activeBoss || activeBoss.type !== 'void') return;
            const b = activeBoss;
            b.movePhase = 'barrage';
            b.coreExposed = true;
            b.barrageTimer = 6.5;
            b.barrageShotTimer = 0.15;
            b.barrageAngle = 0;
            playVoidStaticCrush();
        }

        function updateVoidBarrage(dt) {
            const b = activeBoss;
            b.barrageTimer -= dt;
            b.barrageShotTimer -= dt;
            if (b.core) {
                const pulse = 0.75 + Math.sin(performance.now() * 0.012) * 0.25;
                b.core.material.opacity = pulse;
                b.core.scale.setScalar(1.1 + pulse * 0.15);
            }
            if (b.barrageShotTimer <= 0) {
                fireVoidBarrageProjectile();
                b.barrageShotTimer = 0.22;
            }
            return b.barrageTimer <= 0;
        }

        function beginVoidEventHorizon() {
            if (!activeBoss || activeBoss.type !== 'void') return;
            const b = activeBoss;
            b.movePhase = 'horizon';
            playEventHorizonSiren();
            b.horizonRing.visible = false;

            const mesh = new THREE.Mesh(
                new THREE.TorusGeometry(1, 0.28, 8, 64),
                new THREE.MeshBasicMaterial({ color: 0xbb44ff, transparent: true, opacity: 0.82 })
            );
            const wire = new THREE.LineSegments(
                new THREE.EdgesGeometry(new THREE.TorusGeometry(1.05, 0.32, 6, 48)),
                new THREE.LineBasicMaterial({ color: 0xff88ff, transparent: true, opacity: 0.95 })
            );
            mesh.rotation.x = Math.PI / 2;
            wire.rotation.copy(mesh.rotation);
            mesh.position.set(0, 8, 0);
            wire.position.copy(mesh.position);
            scene.add(mesh, wire);

            voidEventHorizon = {
                mesh,
                wire,
                phase: 'expand',
                timer: 0.6,
                collapseTimer: 6,
                radius: 6,
                maxRadius: ARENA * 0.96
            };
        }

        function updateVoidEventHorizon(dt) {
            if (!voidEventHorizon) return false;
            const h = voidEventHorizon;

            if (h.phase === 'expand') {
                h.timer -= dt;
                h.radius = THREE.MathUtils.lerp(6, h.maxRadius, 1 - h.timer / 0.6);
                if (h.timer <= 0) {
                    h.phase = 'collapse';
                    h.radius = h.maxRadius;
                }
            } else {
                h.collapseTimer -= dt;
                h.radius = Math.max(2, h.maxRadius * (h.collapseTimer / 6));
                const dist = Math.hypot(playerPos.x, playerPos.z);
                if (dist > h.radius - 0.8) {
                    applyBossDamage(36, dt, new THREE.Vector3(playerPos.x, 0, playerPos.z));
                }
                if (h.collapseTimer <= 0) {
                    clearVoidEventHorizon();
                    if (activeBoss) activeBoss.horizonRing.visible = true;
                    return true;
                }
            }

            const scale = h.radius;
            h.mesh.scale.set(scale, scale, scale);
            h.wire.scale.copy(h.mesh.scale);
            h.mesh.material.opacity = 0.55 + Math.sin(performance.now() * 0.008) * 0.25;
            return false;
        }

        function updateShockwaves(dt) {
            shockwaves = shockwaves.filter(s => {
                s.life -= dt;
                const expand = s.voidPulse ? 0.06 : 0.1;
                s.mesh.scale.addScalar(expand);
                if (s.glow) s.glow.scale.copy(s.mesh.scale);
                s.radius = s.baseOuter * s.mesh.scale.x;
                s.mesh.material.opacity = Math.max(0, s.life / 6) * 0.98;

                const dx = playerPos.x - s.mesh.position.x;
                const dz = playerPos.z - s.mesh.position.z;
                const dist = Math.hypot(dx, dz);
                if (onGround && Math.abs(dist - s.radius) < s.width) {
                    applyBossDamage(s.voidPulse ? 26 : 34, dt, s.mesh.position);
                }

                if (s.life <= 0 || s.radius > ARENA * 1.25) {
                    scene.remove(s.mesh);
                    if (s.glow) scene.remove(s.glow);
                    return false;
                }
                return true;
            });
        }

        function updateApexBoss(dt) {
            const b = activeBoss;
            const t = performance.now() * 0.001;
            b.mesh.position.y = 10 + Math.sin(t * 1.2) * 1.1;
            if (b.core) {
                const pulse = 0.62 + Math.sin(t * 4.2) * 0.28;
                b.core.material.opacity = pulse;
                b.core.scale.setScalar(0.92 + pulse * 0.12);
                b.core.rotation.y -= dt * 1.4;
                b.core.rotation.x += dt * 0.6;
            }
            if (b.coreGlow) {
                b.coreGlow.rotation.copy(b.core.rotation);
                b.coreGlow.scale.copy(b.core.scale);
            }

            (b.rings || []).forEach(r => {
                r.fill.rotation.x += r.speed[0] * dt;
                r.fill.rotation.y += r.speed[1] * dt;
                r.fill.rotation.z += r.speed[2] * dt;
                r.wire.rotation.copy(r.fill.rotation);
            });

            const attacking = b.mode === 'projectiles' || b.mode === 'laserwall';
            b.crownFlare = THREE.MathUtils.lerp(b.crownFlare || 0, attacking ? 1 : 0, dt * 5);
            if (b.crown) {
                const flare = b.crownFlare;
                b.crown.scale.set(1 + flare * 0.45, 1 + flare * 0.2, 1 + flare * 0.45);
                b.crown.rotation.y += dt * (1.2 + flare * 6);
                b.crown.children.forEach((spike, i) => {
                    spike.material.opacity = 0.45 + flare * 0.55;
                    spike.scale.y = 1 + flare * 0.35 * (i % 2 === 0 ? 1 : 0.7);
                });
            }

            b.modeTimer -= dt;
            if (b.modeTimer <= 0) {
                b.mode = b.mode === 'projectiles' ? 'laserwall' : 'projectiles';
                b.modeTimer = 7.5;
                if (b.mode === 'laserwall') spawnBossLaserWall();
            }

            if (b.mode === 'projectiles') {
                b.shootTimer -= dt;
                if (b.shootTimer <= 0) {
                    bossShootAtPlayer();
                    b.shootTimer = 0.11;
                }
            }
        }

        function finishVoidAttack(b) {
            b.movePhase = 'idle';
            b.coreExposed = false;
            setTentacleCharge(b.tentacles, b.slamTentacles || [1, 2, 4], false);
            (b.tentacles || []).forEach(t => {
                t.group.rotation.x = 0;
                t.group.position.y = 0;
            });
            clearVoidSlamZones();
            if (b.attackMode === 'slam') b.attackMode = 'barrage';
            else if (b.attackMode === 'barrage') b.attackMode = 'horizon';
            else b.attackMode = 'slam';
            b.attackTimer = 5.5;
        }

        function updateVoidBoss(dt) {
            const b = activeBoss;
            const time = performance.now() * 0.001;

            b.mesh.position.set(0, b.floatY + Math.sin(time * 0.9) * 0.35, 0);
            b.mesh.lookAt(playerPos.x, b.mesh.position.y, playerPos.z);

            if (b.horizonRing && b.horizonRing.visible) {
                b.horizonRing.rotation.y += dt * 0.35;
                b.horizonRing.rotation.z = Math.sin(time * 0.6) * 0.08;
            }
            if (b.core && !b.coreExposed) {
                const pulse = 0.62 + Math.sin(time * 3.5) * 0.22;
                b.core.material.opacity = pulse;
                b.core.rotation.y += dt * 1.2;
            }
            updateVoidPlates(b, time);

            if (b.movePhase === 'slam') {
                if (updateVoidSlam(dt)) finishVoidAttack(b);
                return;
            }
            if (b.movePhase === 'barrage') {
                (b.tentacles || []).forEach(t => updateVoidTentacleIdle(t, dt, time));
                if (updateVoidBarrage(dt)) finishVoidAttack(b);
                return;
            }
            if (b.movePhase === 'horizon') {
                (b.tentacles || []).forEach(t => updateVoidTentacleIdle(t, dt, time));
                if (updateVoidEventHorizon(dt)) finishVoidAttack(b);
                return;
            }

            (b.tentacles || []).forEach(t => updateVoidTentacleIdle(t, dt, time));

            b.attackTimer -= dt;
            if (b.attackTimer <= 0.6 && b.attackTimer > 0 && !b.attackWarned) {
                playVoidAttackWarning();
                b.attackWarned = true;
            }
            if (b.attackTimer > 0.65) b.attackWarned = false;

            if (b.attackTimer <= 0) {
                if (b.attackMode === 'slam') beginVoidSlam();
                else if (b.attackMode === 'barrage') beginVoidBarrage();
                else beginVoidEventHorizon();
            }
        }

        function updateLaserWalls(dt) {
            laserWalls = laserWalls.filter(w => {
                w.life -= dt;
                w.mesh.position.z += w.velZ * dt;
                if (Math.abs(playerPos.z - w.mesh.position.z) < 1.1 &&
                    Math.abs(playerPos.y - w.mesh.position.y) < 1.2 &&
                    Math.abs(playerPos.x) < ARENA * 0.95) {
                    applyBossDamage(22, dt, w.mesh.position);
                }
                if (w.life <= 0 || w.mesh.position.z > ARENA * 1.1) {
                    scene.remove(w.mesh);
                    return false;
                }
                return true;
            });
        }

        function updateBoss(dt) {
            if (!activeBoss || bossIntroActive || bossDefeatActive || voidTransformActive) return;
            if (activeBoss.type === 'void' && activeBoss.voidPhase === 1) updateVoidPhantomBoss(dt);
            else if (activeBoss.type === 'void') updateVoidBoss(dt);
            else updateApexBoss(dt);
            updateLaserWalls(dt);
            updateBossBar();
        }

        function promoteMeshToScene(obj, parent) {
            parent.updateWorldMatrix(true, false);
            const wp = new THREE.Vector3();
            const wq = new THREE.Quaternion();
            const ws = new THREE.Vector3();
            obj.matrixWorld.decompose(wp, wq, ws);
            parent.remove(obj);
            scene.add(obj);
            obj.position.copy(wp);
            obj.quaternion.copy(wq);
            obj.scale.copy(ws);
        }

        function collectBossDebris() {
            bossDebris = [];
            if (!activeBoss) return;
            const parent = activeBoss.mesh;
            const pieces = [];

            if (activeBoss.type === 'void') {
                if (activeBoss.voidPhase === 1) {
                    if (activeBoss.core) pieces.push({ mesh: activeBoss.core, isCore: true });
                    if (activeBoss.coreWire) pieces.push({ mesh: activeBoss.coreWire });
                    (activeBoss.shards || []).forEach(s => {
                        pieces.push({ mesh: s.mesh });
                        pieces.push({ mesh: s.wire });
                    });
                    if (activeBoss.bladeL) pieces.push({ mesh: activeBoss.bladeL });
                    if (activeBoss.bladeR) pieces.push({ mesh: activeBoss.bladeR });
                } else {
                if (activeBoss.core) pieces.push({ mesh: activeBoss.core, isCore: true });
                if (activeBoss.coreWire) pieces.push({ mesh: activeBoss.coreWire });
                if (activeBoss.pyramidShell) pieces.push({ mesh: activeBoss.pyramidShell });
                (activeBoss.plates || []).forEach(p => {
                    pieces.push({ mesh: p.mesh });
                    pieces.push({ mesh: p.wire });
                });
                (activeBoss.tentacles || []).forEach(t => {
                    t.segments.forEach(seg => pieces.push({ mesh: seg.wire, parent: t.group }));
                });
                if (activeBoss.horizonRing && activeBoss.horizonRing.visible) {
                    if (activeBoss.ringFill) pieces.push({ mesh: activeBoss.ringFill, parent: activeBoss.horizonRing });
                    if (activeBoss.ringWire) pieces.push({ mesh: activeBoss.ringWire, parent: activeBoss.horizonRing });
                }
                }
            } else if (activeBoss.type === 'apex') {
                if (activeBoss.core) pieces.push({ mesh: activeBoss.core, isCore: true });
                if (activeBoss.coreGlow) pieces.push({ mesh: activeBoss.coreGlow });
                (activeBoss.rings || []).forEach(r => {
                    pieces.push({ mesh: r.fill });
                    pieces.push({ mesh: r.wire });
                });
                if (activeBoss.crown) {
                    activeBoss.crown.children.forEach(c => pieces.push({ mesh: c }));
                }
            }

            pieces.forEach(p => {
                promoteMeshToScene(p.mesh, p.parent || parent);
                const origin = p.mesh.position.clone();
                bossDebris.push({
                    mesh: p.mesh,
                    isCore: !!p.isCore,
                    origin,
                    vel: new THREE.Vector3(
                        (Math.random() - 0.5) * 18,
                        5 + Math.random() * 12,
                        (Math.random() - 0.5) * 18
                    ),
                    life: 1.5,
                    spin: new THREE.Vector3(
                        (Math.random() - 0.5) * 9,
                        (Math.random() - 0.5) * 9,
                        (Math.random() - 0.5) * 9
                    )
                });
            });

            if (voidEventHorizon) {
                [voidEventHorizon.mesh, voidEventHorizon.wire].forEach(m => {
                    if (!m) return;
                    bossDebris.push({
                        mesh: m,
                        vel: new THREE.Vector3(
                            (Math.random() - 0.5) * 22,
                            4 + Math.random() * 10,
                            (Math.random() - 0.5) * 22
                        ),
                        life: 1.5,
                        spin: new THREE.Vector3(
                            (Math.random() - 0.5) * 11,
                            (Math.random() - 0.5) * 11,
                            (Math.random() - 0.5) * 11
                        )
                    });
                });
                voidEventHorizon = null;
            }
        }

        function getVoidBossCoreWorld() {
            const pos = new THREE.Vector3();
            if (activeBoss.core) activeBoss.core.getWorldPosition(pos);
            else activeBoss.mesh.getWorldPosition(pos);
            return pos;
        }

        function launchBossDebris() {
            bossDebris.forEach(d => {
                if (!d.vel) return;
                d.vel.add(new THREE.Vector3(
                    (Math.random() - 0.5) * 6,
                    Math.random() * 4,
                    (Math.random() - 0.5) * 6
                ));
            });
        }

        function updateBossDebris(dt) {
            bossDebris = bossDebris.filter(d => {
                d.life -= dt;
                if (d.vel) {
                    d.vel.y -= 12 * dt;
                    d.mesh.position.add(d.vel.clone().multiplyScalar(dt));
                    d.mesh.rotation.x += d.spin.x * dt;
                    d.mesh.rotation.y += d.spin.y * dt;
                    d.mesh.rotation.z += d.spin.z * dt;
                }
                if (d.wire) d.wire.position.copy(d.mesh.position);
                if (d.mesh.material && d.mesh.material.opacity !== undefined) {
                    d.mesh.material.opacity = Math.max(0, d.life / 1.5) * (d.isCore ? 0.95 : 0.82);
                    d.mesh.scale.multiplyScalar(0.998);
                }
                if (d.life <= 0) {
                    scene.remove(d.mesh);
                    if (d.wire) scene.remove(d.wire);
                    return false;
                }
                return true;
            });
        }

        function finishBossDefeat() {
            bossDefeatActive = false;
            bossDefeatPhase = 'idle';
            defeatFlashEl.style.opacity = '0';
            clearBossDebris();
            clearBossExtras();
            isBossWave = false;
            hideBossHud();
            hideBossDialogue();
            bossIntroActive = false;
            lastDialogueCharCount = 0;
            voidTransformActive = false;
            voidTransformPhase = 'idle';
            voidTransformTimer = 0;
            cinematicDialogueActive = false;
            cinematicDialogueDone = false;
            styleMultiplier = Math.min(8, styleMultiplier + 1.0);
            score += Math.floor(500 * styleMultiplier);
            for (let i = 0; i < 6; i++) {
                const m = new THREE.Mesh(
                    new THREE.SphereGeometry(0.18, 6, 6),
                    new THREE.MeshBasicMaterial({ color: 0x44ff88 })
                );
                m.position.copy(playerPos);
                scene.add(m);
                healParticles.push({ mesh: m, life: 4 });
            }
            wave += 1;
            spawnWave();
        }

        function triggerBossExplosion() {
            hideBossDialogue();
            playBossDeathScream();
            screenShake = 2.2;
            collectBossDebris();
            scene.remove(activeBoss.mesh);
            activeBoss = null;
            launchBossDebris();
            defeatFlashEl.style.opacity = '1';
            bossDefeatPhase = 'explode';
            bossDefeatTimer = 2;
        }

        function startBossDefeatSequence() {
            if (bossDefeatActive || !activeBoss || voidTransformActive) return;
            bossDefeatActive = true;
            bossDefeatPhase = 'dyingwords';
            activeBoss.hp = 0;
            updateBossBar();
            clearVoidSlamZones();
            clearVoidEventHorizon();
            clearVoidPhantomExtras();
            const line = activeBoss.dyingMessage || '...';
            startCinematicDialogue(line, true, triggerBossExplosion);
        }

        function updateBossDefeat(rawDt) {
            if (!bossDefeatActive) return;

            if (bossDefeatPhase === 'dyingwords') {
                updateCinematicDialogue(rawDt);
                return;
            }

            if (bossDefeatPhase === 'explode') {
                bossDefeatTimer -= rawDt;
                defeatFlashEl.style.opacity = String(Math.max(0, bossDefeatTimer / 2));
                screenShake = Math.max(0, bossDefeatTimer * 0.9);
                updateBossDebris(rawDt);
                if (bossDefeatTimer <= 0) finishBossDefeat();
            }
        }

        function damageBoss(amt, source) {
            if (!activeBoss || bossDefeatActive || voidTransformActive) return;
            let dmg = amt;
            if (source === 'primary') dmg = BOSS_PRIMARY_DMG;
            else if (source === 'parry') dmg = BOSS_PARRY_DMG;
            else if (source === 'pierce') dmg = BOSS_PIERCE_DMG;

            if (activeBoss.type === 'void' && activeBoss.voidPhase === 1 && source === 'parry') {
                dmg = BOSS_VOID_BLINK_PARRY_CRIT;
            } else if (activeBoss.type === 'void' && activeBoss.voidPhase === 2 && activeBoss.coreExposed && (source === 'pierce' || source === 'parry')) {
                dmg = source === 'pierce' ? BOSS_VOID_PIERCE_CRIT : BOSS_VOID_PARRY_CRIT;
            }

            activeBoss.hp -= dmg;
            updateBossBar();
            if (activeBoss.hp <= 0) {
                if (activeBoss.type === 'void' && activeBoss.voidPhase === 1) {
                    activeBoss.hp = 0;
                    updateBossBar();
                    startVoidAscension();
                    return;
                }
                startBossDefeatSequence();
            }
        }

        function killBoss() {
            startBossDefeatSequence();
        }

        function spawnWave() {
            enemies.forEach(e => scene.remove(e.mesh));
            enemies = [];
            clearBossExtras();
            activeBoss = null;
            isBossWave = false;
            bossIntroActive = false;
            lastDialogueCharCount = 0;
            hideBossHud();
            hideBossDialogue();

            if (wave % 5 === 0) {
                spawnBoss();
                return;
            }

            const count = wave * 3;
            for (let i = 0; i < count; i++) {
                const type = Math.random() < 0.45 ? 'drone' : 'husk';
                const angle = Math.random() * Math.PI * 2;
                const dist = 14 + Math.random() * (ARENA * 0.55);
                spawnEnemy(type, Math.cos(angle) * dist, Math.sin(angle) * dist);
            }
        }

        function shootPlayer() {
            if (shootCooldown > 0) return;
            shootCooldown = 0.18;
            gunRecoil = 0.08;
            playShootSound();
            const dir = getAimDirection();
            const speed = 55 * speedMult();
            const mesh = new THREE.Mesh(
                new THREE.SphereGeometry(0.18, 6, 6),
                new THREE.MeshBasicMaterial({ color: 0x00ffff })
            );
            mesh.position.copy(getMuzzleWorldPosition());
            scene.add(mesh);
            projectiles.push({
                mesh, vel: dir.clone().multiplyScalar(speed), owner: 'player',
                life: 3, damage: PLAYER_SHOT_DAMAGE
            });
        }

        function distPointToRay(point, origin, dir) {
            const v = point.clone().sub(origin);
            const t = v.dot(dir);
            if (t < 0 || t > 90) return Infinity;
            const closest = origin.clone().add(dir.clone().multiplyScalar(t));
            return closest.distanceTo(point);
        }

        function firePierceShot() {
            const origin = getMuzzleWorldPosition();
            const dir = getAimDirection();
            const maxDist = 90;
            playPierceBlastSound();
            screenShake = 0.45;
            styleMultiplier = Math.min(8, styleMultiplier + 0.4);

            const beamGeo = new THREE.CylinderGeometry(0.2, 0.12, maxDist, 10);
            const beamMat = new THREE.MeshBasicMaterial({ color: 0x00ffff, transparent: true, opacity: 0.85 });
            const beam = new THREE.Mesh(beamGeo, beamMat);
            beam.quaternion.setFromUnitVectors(new THREE.Vector3(0, 1, 0), dir);
            beam.position.copy(origin).add(dir.clone().multiplyScalar(maxDist * 0.5));
            scene.add(beam);
            beamEffects.push({ mesh: beam, life: 0.18 });

            const hitSet = new Set();
            for (const enemy of enemies) {
                if (distPointToRay(enemy.mesh.position, origin, dir) < 1.8) hitSet.add(enemy);
            }
            hitSet.forEach(enemy => damageEnemy(enemy, PIERCE_DAMAGE, !onGround));
            if (activeBoss) {
                const voidP1 = activeBoss.type === 'void' && activeBoss.voidPhase === 1;
                const voidCoreExposed = activeBoss.type === 'void' && activeBoss.voidPhase === 2 && activeBoss.coreExposed;
                const hitPoint = voidCoreExposed ? getVoidBossCoreWorld() : activeBoss.mesh.position;
                const hitRadius = voidP1 ? 2.2 : (activeBoss.type === 'void' ? (voidCoreExposed ? 2.4 : 6.5) : 4.5);
                if (distPointToRay(hitPoint, origin, dir) < hitRadius) {
                    damageBoss(BOSS_PIERCE_DMG, 'pierce');
                }
            }
        }

        function releaseLeftMouse() {
            if (chargeCommitted || leftHoldTime >= TAP_HOLD_THRESHOLD) {
                if (chargeLevel >= 100) firePierceShot();
            } else {
                shootPlayer();
            }
            chargeLevel = 0;
            isCharging = false;
            chargeCommitted = false;
            chargeWasFull = false;
            leftHoldTime = 0;
            drawBatteryHUD();
        }

        function updateLeftMouse(dt) {
            if (!mouseDown.left || !gameRunning || player.isParrying) return;
            leftHoldTime += dt;
            if (leftHoldTime >= TAP_HOLD_THRESHOLD) {
                chargeCommitted = true;
                isCharging = true;
                const prevCharge = chargeLevel;
                chargeLevel = Math.min(100, chargeLevel + dt * CHARGE_RATE);
                if (prevCharge < 100 && chargeLevel >= 100 && !chargeWasFull) {
                    chargeWasFull = true;
                    playChargeReadyClick();
                }
                drawBatteryHUD();
            }
        }

        function enemyShoot(enemy) {
            const dir = new THREE.Vector3().subVectors(playerPos, enemy.mesh.position).normalize();
            const mesh = new THREE.Mesh(
                new THREE.SphereGeometry(0.22, 6, 6),
                new THREE.MeshBasicMaterial({ color: 0xff2244 })
            );
            mesh.position.copy(enemy.mesh.position);
            scene.add(mesh);
            projectiles.push({ mesh, vel: dir.multiplyScalar(22), owner: 'enemy', life: 5 });
        }

        function startParry() {
            if (player.isParrying || isCharging) return;
            player.isParrying = true;
            parryTimer = PARRY_WINDOW;
            parryAnimTimer = 0;
            armGroup.visible = true;
            armGroup.position.copy(parryRestPos);
            armGroup.rotation.set(0, 0, 0);
        }

        function getParryHitCenter() {
            const center = new THREE.Vector3();
            armGroup.getWorldPosition(center);
            const forward = getAimDirection();
            return center.add(forward.multiplyScalar(0.35));
        }

        function triggerParrySuccess(impactPos) {
            freezeTimer = 0.1;
            flashTimer = PARRY_FLASH_DECAY;
            parryFlashEl.classList.add('solid');
            parryFlashEl.style.opacity = '1';
            playParryImpactSound();
            styleMultiplier = Math.min(8, styleMultiplier + 0.5);
            for (let i = 0; i < 16; i++) {
                const angle = (Math.PI * 2 / 16) * i + Math.random() * 0.4;
                const mesh = new THREE.Mesh(
                    new THREE.SphereGeometry(0.08 + Math.random() * 0.06, 4, 4),
                    new THREE.MeshBasicMaterial({ color: Math.random() > 0.5 ? 0xffffff : 0x00ffff })
                );
                mesh.position.copy(impactPos);
                scene.add(mesh);
                const spread = new THREE.Vector3(
                    Math.cos(angle) * (2 + Math.random() * 4),
                    (Math.random() - 0.5) * 3,
                    Math.sin(angle) * (2 + Math.random() * 4)
                );
                parryBursts.push({ mesh, vel: spread, life: 0.35 + Math.random() * 0.15 });
            }
        }

        function lerpRot(a, b, t) {
            armGroup.rotation.x = THREE.MathUtils.lerp(a.x, b.x, t);
            armGroup.rotation.y = THREE.MathUtils.lerp(a.y, b.y, t);
            armGroup.rotation.z = THREE.MathUtils.lerp(a.z, b.z, t);
        }

        function updateParryArm(dt) {
            if (!player.isParrying) {
                armGroup.visible = false;
                armGroup.position.copy(parryRestPos);
                armGroup.rotation.set(0, 0, 0);
                return;
            }

            armGroup.visible = true;
            parryAnimTimer += dt;
            const ms = parryAnimTimer * 1000;

            if (ms <= 30) {
                const p = ms / 30;
                armGroup.position.lerpVectors(parryRestPos, parryWindPos, p);
                lerpRot({ x: 0, y: 0, z: 0 }, parryWindRot, p);
            } else if (ms <= 70) {
                const p = (ms - 31) / 39;
                const eased = 1 - Math.pow(1 - p, 4);
                armGroup.position.lerpVectors(parryWindPos, parryStrikePos, eased);
                lerpRot(parryWindRot, parryStrikeRot, eased);
            } else if (ms <= PARRY_ANIM_MS) {
                const p = (ms - 71) / (PARRY_ANIM_MS - 71);
                armGroup.position.lerpVectors(parryStrikePos, parryRestPos, p);
                lerpRot(parryStrikeRot, { x: 0, y: 0, z: 0 }, p);
            } else {
                armGroup.visible = false;
                armGroup.position.copy(parryRestPos);
                armGroup.rotation.set(0, 0, 0);
            }
        }

        function updateWeaponRig(dt) {
            if (gunRecoil > 0) {
                gunRecoil = Math.max(0, gunRecoil - dt * 0.55);
                cyberRevolver.position.z = REVOLVER_BASE.z + gunRecoil * 0.35;
                cyberRevolver.rotation.x = -0.1 - gunRecoil * 0.6;
            } else {
                cyberRevolver.position.set(REVOLVER_BASE.x, REVOLVER_BASE.y, REVOLVER_BASE.z);
                cyberRevolver.rotation.x = -0.1;
            }
            if (isCharging) {
                const pulse = 1 + Math.sin(performance.now() * 0.018) * 0.015 * (chargeLevel / 100);
                batteryHUD.scale.set(pulse, pulse, 1);
            } else {
                batteryHUD.scale.set(1, 1, 1);
            }
            updateParryArm(dt);
        }

        function updateBeamEffects(dt) {
            beamEffects = beamEffects.filter(b => {
                b.life -= dt;
                b.mesh.material.opacity = Math.max(0, b.life / 0.18) * 0.85;
                if (b.life <= 0) {
                    scene.remove(b.mesh);
                    return false;
                }
                return true;
            });
        }

        function updateParryBursts(dt) {
            parryBursts = parryBursts.filter(b => {
                b.life -= dt;
                b.mesh.position.add(b.vel.clone().multiplyScalar(dt));
                b.vel.multiplyScalar(0.92);
                if (b.life <= 0) {
                    scene.remove(b.mesh);
                    return false;
                }
                return true;
            });
        }

        function updateFlash(dt) {
            if (flashTimer > 0) {
                flashTimer = Math.max(0, flashTimer - dt);
                parryFlashEl.style.opacity = String(Math.min(1, flashTimer / PARRY_FLASH_DECAY));
                if (flashTimer <= 0) parryFlashEl.classList.remove('solid');
            }
        }

        function applyScreenShake() {
            if (screenShake > 0) {
                camera.rotation.x += (Math.random() - 0.5) * screenShake * 0.06;
                camera.rotation.y += (Math.random() - 0.5) * screenShake * 0.06;
            }
        }

        function damageEnemy(enemy, amt, midAir) {
            enemy.hp -= amt;
            if (enemy.hp <= 0) {
                killEnemy(enemy, midAir);
            }
        }

        function killEnemy(enemy, midAir) {
            if (midAir) styleMultiplier = Math.min(8, styleMultiplier + 0.2);
            score += Math.floor(100 * styleMultiplier);
            const pos = enemy.mesh.position.clone();
            scene.remove(enemy.mesh);
            enemies = enemies.filter(e => e !== enemy);
            for (let i = 0; i < 3; i++) {
                const m = new THREE.Mesh(
                    new THREE.SphereGeometry(0.15, 6, 6),
                    new THREE.MeshBasicMaterial({ color: 0x44ff88 })
                );
                m.position.copy(pos);
                scene.add(m);
                healParticles.push({ mesh: m, life: 4 });
            }
            if (!isBossWave && !enemies.length) {
                wave += 1;
                spawnWave();
            }
        }

        function slamImpact() {
            const radius = 6;
            styleMultiplier = Math.min(8, styleMultiplier + 0.3);
            enemies.forEach(enemy => {
                const d = enemy.mesh.position.distanceTo(new THREE.Vector3(playerPos.x, enemy.mesh.position.y, playerPos.z));
                if (d < radius) damageEnemy(enemy, 40, false);
            });
            projectiles = projectiles.filter(p => {
                if (p.owner === 'enemy' && p.mesh.position.distanceTo(playerPos) < radius) {
                    scene.remove(p.mesh);
                    return false;
                }
                return true;
            });
        }

        function resetGame() {
            score = 0;
            styleMultiplier = 1.0;
            styleRank = 'DULL';
            wave = 1;
            player = {
                hp: 100,
                maxHp: 100,
                isSliding: false,
                isParrying: false,
                canDash: true,
                canBeLaunched: true,
                vel: { y: 0 },
                onPad: false
            };
            playerPos.set(0, FLOOR_Y + EYE_HEIGHT, 0);
            velY = 0;
            player.vel.y = 0;
            onGround = true;
            isSlamming = false;
            yaw = 0;
            pitch = 0;
            enemies.forEach(e => scene.remove(e.mesh));
            projectiles.forEach(p => scene.remove(p.mesh));
            healParticles.forEach(h => scene.remove(h.mesh));
            parryBursts.forEach(b => scene.remove(b.mesh));
            parryBursts = [];
            beamEffects.forEach(b => scene.remove(b.mesh));
            beamEffects = [];
            clearBossExtras();
            clearBossDebris();
            if (activeBoss) scene.remove(activeBoss.mesh);
            activeBoss = null;
            isBossWave = false;
            bossIntroActive = false;
            bossDefeatActive = false;
            bossDefeatPhase = 'idle';
            bossDefeatTimer = 0;
            defeatFlashEl.style.opacity = '0';
            voidTransformActive = false;
            voidTransformPhase = 'idle';
            cinematicDialogueActive = false;
            lastDialogueCharCount = 0;
            hideBossHud();
            hideBossDialogue();
            hitFlashTimer = 0;
            damageFlashEl.style.opacity = '0';
            freezeTimer = 0;
            flashTimer = 0;
            screenShake = 0;
            isCharging = false;
            chargeLevel = 0;
            chargeCommitted = false;
            leftHoldTime = 0;
            parryFlashEl.style.opacity = '0';
            parryFlashEl.classList.remove('solid');
            parryAnimTimer = 0;
            gunRecoil = 0;
            chargeWasFull = false;
            drawBatteryHUD();
            enemies = [];
            projectiles = [];
            healParticles = [];
            spawnWave();
            updateUI();
        }

        function gameOver() {
            gameRunning = false;
            document.exitPointerLock?.();
            document.getElementById('finalStats').textContent = `Score ${score} · Wave ${wave} · Rank ${styleRank}`;
            document.getElementById('gameOverScreen').style.display = 'flex';
        }

        function clampArena() {
            playerPos.x = Math.max(-FLOOR_LIMIT, Math.min(FLOOR_LIMIT, playerPos.x));
            playerPos.z = Math.max(-FLOOR_LIMIT, Math.min(FLOOR_LIMIT, playerPos.z));
        }

        function onArenaFloor() {
            return Math.abs(playerPos.x) <= ARENA && Math.abs(playerPos.z) <= ARENA;
        }

        function updateShiftingPillars(dt) {
            const t = performance.now() * 0.001;
            drawObsidianFloor(t);
            cathedralOverhead.forEach(item => {
                item.group.rotation.y += item.speed * (dt || 0.016);
            });
            for (const p of pillars) {
                const y = p.baseY + Math.sin(t * 0.55 + p.phase) * p.amp;
                p.mesh.position.y = y;
            }
            const pulse = 0.5 + Math.sin(t * 4) * 0.08;
            jumpPads.forEach(pad => {
                if (pad.pad) pad.pad.material.opacity = pulse;
            });
        }

        function checkJumpPads() {
            let onAnyPad = false;
            for (const pad of jumpPads) {
                const dx = playerPos.x - pad.x;
                const dz = playerPos.z - pad.z;
                const inside = dx * dx + dz * dz < pad.radius * pad.radius;
                if (inside) {
                    onAnyPad = true;
                    if (player.canBeLaunched) {
                        player.vel.y = JUMP_PAD_VEL;
                        velY = JUMP_PAD_VEL;
                        player.canBeLaunched = false;
                        onGround = false;
                    }
                }
            }

            if (!onAnyPad) {
                player.onPad = false;
            } else {
                player.onPad = true;
            }

            if ((!onAnyPad || onGround) && onArenaFloor() && playerPos.y <= FLOOR_Y + EYE_HEIGHT + 0.05) {
                player.canBeLaunched = true;
            }
        }

        function checkChasmFall() {
            if (onArenaFloor()) return;
            if (playerPos.y < CHASM_Y) {
                player.hp -= 15;
                playerPos.set(0, FLOOR_Y + EYE_HEIGHT, 0);
                velY = 0;
                player.vel.y = 0;
                player.canBeLaunched = true;
                if (player.hp <= 0) gameOver();
                else updateUI();
            }
        }

        function pillarCollision() {
            for (const p of pillars) {
                const px = p.mesh.position.x;
                const pz = p.mesh.position.z;
                if (Math.abs(playerPos.x - px) < p.half + 0.4 && Math.abs(playerPos.z - pz) < p.half + 0.4) {
                    const dx = playerPos.x - px;
                    const dz = playerPos.z - pz;
                    if (Math.abs(dx) > Math.abs(dz)) playerPos.x = px + Math.sign(dx) * (p.half + 0.45);
                    else playerPos.z = pz + Math.sign(dz) * (p.half + 0.45);
                }
            }
        }

        function updatePlayer(dt) {
            const forward = new THREE.Vector3(-Math.sin(yaw), 0, -Math.cos(yaw));
            const right = new THREE.Vector3(Math.cos(yaw), 0, -Math.sin(yaw));
            let move = new THREE.Vector3();
            if (keys.KeyW) move.add(forward);
            if (keys.KeyS) move.sub(forward);
            if (keys.KeyA) move.sub(right);
            if (keys.KeyD) move.add(right);
            if (move.lengthSq() > 0) move.normalize();

            let speed = BASE_SPEED * speedMult();
            if (player.isSliding) speed *= 1.4;

            playerPos.x += move.x * speed * dt;
            playerPos.z += move.z * speed * dt;
            clampArena();
            pillarCollision();

            if (isSlamming) {
                velY = -55;
                player.vel.y = velY;
            } else if (!onGround) {
                velY -= GRAVITY * dt;
                player.vel.y = velY;
            }

            playerPos.y += velY * dt;
            const groundY = FLOOR_Y + (player.isSliding ? SLIDE_HEIGHT : EYE_HEIGHT);

            if (onArenaFloor() && playerPos.y <= groundY) {
                if (!onGround && isSlamming) slamImpact();
                playerPos.y = groundY;
                velY = 0;
                player.vel.y = 0;
                onGround = true;
                isSlamming = false;
                if (!player.onPad) player.canBeLaunched = true;
            } else if (!onArenaFloor() || playerPos.y > groundY) {
                onGround = false;
            }

            checkJumpPads();
            checkChasmFall();

            if (parryTimer > 0) {
                parryTimer -= dt;
                if (parryTimer <= 0) player.isParrying = false;
            }
            if (shootCooldown > 0) shootCooldown -= dt;

            updateWeaponRig(dt);

            camera.position.copy(playerPos);
            camera.rotation.order = 'YXZ';
            camera.rotation.y = yaw;
            camera.rotation.x = pitch;
        }

        function updateEnemies(dt) {
            if (activeBoss) {
                updateBoss(dt);
                return;
            }
            for (const enemy of enemies) {
                if (enemy.type === 'drone') {
                    enemy.mesh.position.y = 5 + Math.sin(performance.now() * 0.002 + enemy.mesh.id) * 0.5;
                    enemy.shootTimer -= dt;
                    if (enemy.shootTimer <= 0) {
                        enemyShoot(enemy);
                        enemy.shootTimer = 3;
                    }
                } else {
                    const dir = new THREE.Vector3().subVectors(
                        new THREE.Vector3(playerPos.x, enemy.mesh.position.y, playerPos.z),
                        enemy.mesh.position
                    );
                    const dist = dir.length();
                    if (dist > 0.1) {
                        dir.normalize();
                        enemy.mesh.position.add(dir.multiplyScalar(enemy.speed * dt));
                        enemy.mesh.lookAt(playerPos.x, enemy.mesh.position.y, playerPos.z);
                    }
                    if (dist < 1.8 && player.hp > 0) {
                        player.hp -= 18 * dt;
                        if (player.hp <= 0) gameOver();
                    }
                }
            }
        }

        function updateProjectiles(dt) {
            projectiles = projectiles.filter(p => {
                if (p.gravity) p.vel.y -= p.gravity * dt;
                p.mesh.position.add(p.vel.clone().multiplyScalar(dt));
                p.life -= dt;

                if (player.isParrying && p.owner === 'enemy') {
                    const ms = parryAnimTimer * 1000;
                    if (ms >= 31 && ms <= 70) {
                        const d = p.mesh.position.distanceTo(getParryHitCenter());
                        if (d < 1.5) {
                            const impact = p.mesh.position.clone();
                            if (p.voidBarrage && activeBoss && activeBoss.type === 'void' && activeBoss.voidPhase === 2 && activeBoss.coreExposed) {
                                const corePos = getVoidBossCoreWorld();
                                const dir = new THREE.Vector3().subVectors(corePos, p.mesh.position).normalize();
                                p.vel.copy(dir.multiplyScalar(52));
                            } else {
                                p.vel.negate().multiplyScalar(1.5);
                            }
                            p.owner = 'player';
                            p.damage = PARRY_SHOT_DAMAGE;
                            if (p.fromBoss) p.bossParry = true;
                            triggerParrySuccess(impact);
                            return true;
                        }
                    }
                }

                if (p.owner === 'enemy' && p.mesh.position.distanceTo(playerPos) < 0.9 && player.hp > 0) {
                    player.hp -= 12;
                    if (p.fromBoss || isBossWave) triggerDirectionalHitFlash(p.mesh.position);
                    scene.remove(p.mesh);
                    if (player.hp <= 0) gameOver();
                    return false;
                }

                if (p.owner === 'player') {
                    if (activeBoss) {
                        const voidP1 = activeBoss.type === 'void' && activeBoss.voidPhase === 1;
                        const voidCoreExposed = activeBoss.type === 'void' && activeBoss.voidPhase === 2 && activeBoss.coreExposed;
                        const hitPoint = voidCoreExposed ? getVoidBossCoreWorld() : activeBoss.mesh.position;
                        const hitRadius = voidP1 ? 1.8 : (activeBoss.type === 'void' ? (voidCoreExposed ? 2.2 : 6.5) : 4.2);
                        if (p.mesh.position.distanceTo(hitPoint) < hitRadius) {
                            damageBoss(0, p.bossParry ? 'parry' : 'primary');
                            scene.remove(p.mesh);
                            return false;
                        }
                    }
                    for (const enemy of enemies) {
                        if (p.mesh.position.distanceTo(enemy.mesh.position) < 1.5) {
                            damageEnemy(enemy, p.damage || PLAYER_SHOT_DAMAGE, !onGround);
                            scene.remove(p.mesh);
                            return false;
                        }
                    }
                }

                if (Math.abs(p.mesh.position.x) > ARENA || Math.abs(p.mesh.position.z) > ARENA || p.life <= 0) {
                    scene.remove(p.mesh);
                    return false;
                }
                return true;
            });
        }

        function updateHealParticles(dt) {
            const healAmt = hasSiphonNanites ? 14 : 7;
            healParticles = healParticles.filter(h => {
                h.life -= dt;
                const dir = new THREE.Vector3().subVectors(playerPos, h.mesh.position);
                const dist = dir.length();
                if (dist < 0.6) {
                    player.hp = Math.min(player.maxHp, player.hp + healAmt);
                    scene.remove(h.mesh);
                    return false;
                }
                dir.normalize();
                h.mesh.position.add(dir.multiplyScalar(16 * dt));
                if (h.life <= 0) { scene.remove(h.mesh); return false; }
                return true;
            });
        }

        function updateStyle(dt) {
            styleMultiplier = Math.max(1, styleMultiplier - 0.005);
            updateStyleRank();
        }

        let last = performance.now();
        function loop(now) {
            requestAnimationFrame(loop);
            const rawDt = Math.min((now - last) / 1000, 0.05);
            last = now;
            const cinematicFreeze = bossIntroActive || voidTransformActive ||
                (bossDefeatActive && bossDefeatPhase === 'dyingwords');
            const dt = (freezeTimer > 0 || cinematicFreeze) ? 0 : rawDt;
            if (freezeTimer > 0) freezeTimer = Math.max(0, freezeTimer - rawDt);

            if (gameRunning) {
                updateBossDialogue(rawDt);
                updateBossDefeat(rawDt);
                updateVoidTransform(rawDt);
                updateLeftMouse(rawDt);
                updateShiftingPillars(rawDt);
                updatePlayer(dt);
                applyScreenShake();
                if (screenShake > 0 && !(bossDefeatActive && bossDefeatPhase === 'explode')) {
                    screenShake = Math.max(0, screenShake - rawDt * 2.2);
                }
                updateEnemies(dt);
                updateProjectiles(dt);
                updateHealParticles(dt);
                updateBeamEffects(rawDt);
                updateParryBursts(rawDt);
                updateFlash(rawDt);
                updateDamageFlash(rawDt);
                updateStyle(dt);
                updateUI();
            } else {
                updateFlash(rawDt);
                updateDamageFlash(rawDt);
                updateParryBursts(rawDt);
                updateBeamEffects(rawDt);
            }

            renderer.render(scene, camera);
        }
        requestAnimationFrame(loop);

        document.addEventListener('keydown', e => {
            keys[e.code] = true;
            if (!gameRunning) return;
            if (e.code === 'Space') {
                e.preventDefault();
                if (onGround) {
                    velY = JUMP_V;
                    player.vel.y = JUMP_V;
                    onGround = false;
                }
                else if (hasSlamModule && !isSlamming) isSlamming = true;
            }
            if (e.code === 'ShiftLeft' || e.code === 'ShiftRight') player.isSliding = true;
            if (e.code === 'KeyE') startParry();
        });
        document.addEventListener('keyup', e => {
            keys[e.code] = false;
            if (e.code === 'ShiftLeft' || e.code === 'ShiftRight') player.isSliding = false;
        });
        document.addEventListener('mousedown', e => {
            if (e.button === 0) {
                mouseDown.left = true;
                leftHoldTime = 0;
                chargeCommitted = false;
            }
            if (e.button === 2) {
                e.preventDefault();
                mouseDown.right = true;
                if (gameRunning) startParry();
            }
        });
        document.addEventListener('mouseup', e => {
            if (e.button === 0) {
                mouseDown.left = false;
                if (gameRunning) releaseLeftMouse();
            }
            if (e.button === 2) mouseDown.right = false;
        });
        document.addEventListener('contextmenu', e => e.preventDefault());

        renderer.domElement.addEventListener('click', () => {
            if (gameRunning) renderer.domElement.requestPointerLock();
        });
        document.addEventListener('pointerlockchange', () => {
            pointerLocked = document.pointerLockElement === renderer.domElement;
        });
        document.addEventListener('mousemove', e => {
            if (!pointerLocked || !gameRunning) return;
            yaw -= e.movementX * 0.002;
            pitch -= e.movementY * 0.002;
            pitch = Math.max(-1.2, Math.min(1.2, pitch));
        });

        function beginGame() {
            initAudio();
            resetGame();
            gameRunning = true;
            renderer.domElement.requestPointerLock();
        }

        document.getElementById('startBtn').addEventListener('click', () => {
            document.getElementById('startScreen').classList.add('hidden');
            beginGame();
        });
        document.getElementById('retryBtn').addEventListener('click', () => {
            document.getElementById('gameOverScreen').style.display = 'none';
            beginGame();
        });
        document.getElementById('backHub').addEventListener('click', () => {
            window.location.href = 'index.html';
        });

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    })();
    </script>
</body>
</html>
